<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sunrise · трекер обучения</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* light, airy base */
    --bg:#fbfbfd;
    --bg-tint-1:#fff1f9;
    --bg-tint-2:#f0f4ff;
    --bg-tint-3:#eafaf6;
    --surface:#ffffff;
    --surface-2:#f7f7fb;

    --ink:#1c1730;
    --ink-soft:#4a4566;
    --ink-dim:#8a86a3;
    --ink-faint:#b4b1c6;
    --line:#ececf4;
    --line-soft:#f2f1f8;

    /* vivid friendly palette */
    --fuchsia:#e6399b;
    --fuchsia-2:#ff4fb8;
    --violet:#7c5cff;
    --teal:#13c2b5;
    --amber:#ff9f1c;
    --coral:#ff5d73;
    --blue:#3d8bff;
    --lime:#3ec96b;
    --sky:#22b8e6;

    --primary:var(--fuchsia);
    --accent:var(--fuchsia);

    --shadow-sm:0 2px 8px rgba(28,23,48,.05);
    --shadow-md:0 10px 30px -14px rgba(28,23,48,.18);
    --shadow-lg:0 26px 60px -28px rgba(28,23,48,.26);

    --display:"Sora","Plus Jakarta Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
    --sans:"Plus Jakarta Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"JetBrains Mono","SFMono-Regular",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; min-height:100vh; color:var(--ink);
    font-family:var(--sans); font-size:15px; line-height:1.55;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    background:var(--bg);
    background-image:
      radial-gradient(820px 520px at 8% -8%, rgba(230,57,155,.13), transparent 60%),
      radial-gradient(760px 520px at 96% -4%, rgba(124,92,255,.12), transparent 58%),
      radial-gradient(680px 480px at 50% 108%, rgba(19,194,181,.10), transparent 60%);
    background-attachment:fixed;
  }
  /* faint dotted texture */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;
    background-image:radial-gradient(rgba(124,92,255,.10) 1px, transparent 1px);
    background-size:26px 26px;
    -webkit-mask-image:radial-gradient(900px 700px at 50% -4%, #000 30%, transparent 80%);
            mask-image:radial-gradient(900px 700px at 50% -4%, #000 30%, transparent 80%);
  }

  /* ---- top bar ---- */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap;
    padding:16px 30px;
    background:rgba(251,251,253,.78);
    backdrop-filter:saturate(150%) blur(14px); -webkit-backdrop-filter:saturate(150%) blur(14px);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:14px}
  .brand-logo{
    width:42px; height:42px; border-radius:14px; flex:0 0 auto; position:relative;
    background:linear-gradient(135deg,var(--fuchsia-2),var(--fuchsia) 55%,var(--violet));
    box-shadow:0 8px 22px -8px rgba(230,57,155,.7), inset 0 1px 0 rgba(255,255,255,.5);
    display:grid; place-items:center; overflow:hidden;
  }
  .brand-logo .sun{
    width:18px; height:18px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #ffe27a 40%, #ffb13d);
    box-shadow:0 0 0 4px rgba(255,255,255,.28), 0 0 16px rgba(255,225,120,.9);
  }
  .brand-logo::after{
    content:""; position:absolute; left:-6px; right:-6px; bottom:-2px; height:42%;
    background:linear-gradient(180deg, transparent, rgba(255,255,255,.22));
  }
  .brand-txt{display:flex; flex-direction:column; line-height:1}
  .brand-name{
    font-family:var(--display); font-weight:800; font-size:21px; letter-spacing:-.01em;
    background:linear-gradient(92deg,var(--fuchsia),var(--violet));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .brand-sub{
    font:600 10px var(--mono); color:var(--ink-dim); letter-spacing:.16em;
    text-transform:uppercase; margin-top:5px;
  }
  .toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .field{
    display:flex; align-items:center; gap:8px; font:700 10px var(--mono); color:var(--ink-dim);
    letter-spacing:.12em; text-transform:uppercase;
  }
  select{
    font-family:var(--sans); font-weight:600; font-size:13px; color:var(--ink);
    background:var(--surface); border:1.5px solid var(--line); border-radius:12px; padding:9px 12px;
    outline:none; transition:.18s; box-shadow:var(--shadow-sm); cursor:pointer; max-width:62vw;
  }
  select:hover{border-color:color-mix(in srgb,var(--fuchsia) 50%,var(--line))}
  select:focus{border-color:var(--fuchsia); box-shadow:0 0 0 4px rgba(230,57,155,.14)}
  .btn{
    font-family:var(--sans); font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap;
    border-radius:12px; padding:10px 16px; transition:transform .12s, box-shadow .2s, border-color .2s, background .2s, color .2s;
    border:1.5px solid var(--line); background:var(--surface); color:var(--ink-soft); box-shadow:var(--shadow-sm);
  }
  .btn:hover{transform:translateY(-1px); border-color:color-mix(in srgb,var(--fuchsia) 45%,var(--line)); color:var(--fuchsia)}
  .btn:active{transform:translateY(0)}
  .btn.primary{
    border-color:transparent; color:#fff;
    background:linear-gradient(135deg,var(--fuchsia-2),var(--fuchsia) 60%,var(--violet));
    box-shadow:0 10px 26px -10px rgba(230,57,155,.65), inset 0 1px 0 rgba(255,255,255,.35);
  }
  .btn.primary:hover{color:#fff; box-shadow:0 16px 34px -10px rgba(230,57,155,.7)}

  /* ---- layout ---- */
  .wrap{position:relative; z-index:1; max-width:1160px; margin:0 auto; padding:34px 28px 80px}
  .dash{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; margin-bottom:30px}

  /* ---- cards ---- */
  .card{
    position:relative; border-radius:22px; padding:22px;
    background:var(--surface); border:1px solid var(--line);
    box-shadow:var(--shadow-md);
    overflow:hidden; animation:fadeUp .5s both;
    transition:transform .2s ease, box-shadow .25s ease;
  }
  .card::before{ /* soft tinted wash from the card accent */
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background:radial-gradient(120% 90% at 100% 0%, color-mix(in srgb,var(--accent) 14%, transparent), transparent 60%);
  }
  .card:hover{transform:translateY(-4px); box-shadow:var(--shadow-lg)}
  .card>*{position:relative}
  .eyebrow{
    display:flex; align-items:center; gap:9px; margin-bottom:16px;
    font:800 11px var(--sans); letter-spacing:.04em; color:var(--ink-soft);
  }
  .eyebrow .badge{
    width:30px; height:30px; border-radius:10px; flex:0 0 auto; display:grid; place-items:center;
    font-size:15px; line-height:1;
    background:color-mix(in srgb,var(--accent) 16%, #fff);
    color:var(--accent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 22%, transparent);
  }
  .eyebrow small{font:700 9.5px var(--mono); letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); margin-left:auto}
  .stat-sub{color:var(--ink-dim); font-size:12.5px; margin-top:6px; font-weight:500}

  /* progress ring */
  .ring{
    --p:0; width:96px; height:96px; border-radius:50%; display:grid; place-items:center; position:relative;
    background:conic-gradient(var(--accent) calc(var(--p)*3.6deg), color-mix(in srgb,var(--accent) 12%, #fff) 0);
    margin:4px auto 0;
    filter:drop-shadow(0 8px 18px color-mix(in srgb,var(--accent) 30%, transparent));
  }
  .ring::before{content:""; position:absolute; inset:9px; border-radius:50%; background:var(--surface);
    box-shadow:inset 0 0 0 1px var(--line-soft)}
  .ring b{position:relative; font:800 22px var(--display); color:var(--ink); display:block; text-align:center; letter-spacing:-.02em}
  .ring small{position:relative; display:block; text-align:center; color:var(--ink-dim); font:600 10px var(--mono); margin-top:1px}

  /* streak */
  .flame{font-size:30px; line-height:1; filter:drop-shadow(0 6px 12px rgba(255,93,115,.4))}
  .streak-num{font:800 40px/1 var(--display); margin:5px 0 2px; letter-spacing:-.03em;
    background:linear-gradient(135deg,var(--amber),var(--coral) 60%,var(--fuchsia));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}

  /* bars */
  .prow{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:13px 0 6px; font-size:13px}
  .prow .lbl{display:flex; align-items:center; gap:9px; color:var(--ink-soft); font-weight:600}
  .prow .lbl i{width:9px; height:9px; border-radius:4px; background:var(--accent); flex:0 0 auto}
  .prow .val{font:700 11px var(--mono); color:var(--ink-dim)}
  .bar{height:9px; border-radius:99px; background:var(--surface-2); overflow:hidden; box-shadow:inset 0 0 0 1px var(--line-soft)}
  .bar>i{display:block; height:100%; border-radius:99px;
    background:linear-gradient(90deg, color-mix(in srgb,var(--accent) 70%, #fff), var(--accent));
    transition:width .6s cubic-bezier(.22,1,.36,1)}

  .due-list{font-size:13.5px; line-height:1.85; color:var(--ink-soft); font-weight:600}
  .due-list b{color:var(--accent)}
  .due-empty{color:var(--ink-dim); font-size:13px; display:flex; align-items:center; gap:8px; font-weight:500}

  /* ---- today ---- */
  .day-rail{display:flex; align-items:center; gap:16px; margin-top:0}
  .day-rail .today-wrap{flex:1; min-width:0; margin-top:0}

  .day-nav{
    flex:0 0 auto; width:52px; height:52px; border-radius:18px; cursor:pointer;
    display:grid; place-items:center; line-height:1;
    font-family:var(--display); font-weight:800; font-size:26px; color:var(--accent);
    background:var(--surface); border:1.5px solid var(--line);
    box-shadow:var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.6);
    transition:transform .14s, box-shadow .22s, border-color .2s, color .2s, background .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .day-nav:hover{
    transform:translateY(-2px); color:#fff;
    border-color:transparent;
    background:linear-gradient(135deg,var(--fuchsia-2),var(--fuchsia) 60%,var(--violet));
    box-shadow:0 16px 34px -12px rgba(230,57,155,.6), inset 0 1px 0 rgba(255,255,255,.35);
  }
  .day-nav:active{transform:translateY(0)}
  .day-nav:focus-visible{outline:none; box-shadow:0 0 0 4px rgba(230,57,155,.18), var(--shadow-md)}
  .day-nav:disabled{
    cursor:default; color:var(--ink-faint);
    background:var(--surface-2); border-color:var(--line-soft);
    box-shadow:none; transform:none; opacity:.6;
  }
  .day-nav:disabled:hover{
    transform:none; color:var(--ink-faint);
    background:var(--surface-2); border-color:var(--line-soft); box-shadow:none;
  }

  .next-day-cta{
    display:inline-flex; align-items:center; gap:9px; margin-top:24px;
    font-family:var(--display); font-weight:800; font-size:15px; letter-spacing:-.01em; cursor:pointer;
    color:#fff; border:none; border-radius:16px; padding:14px 26px;
    background:linear-gradient(135deg,var(--fuchsia-2),var(--fuchsia) 55%,var(--violet));
    box-shadow:0 14px 32px -12px rgba(230,57,155,.62), inset 0 1px 0 rgba(255,255,255,.35);
    transition:transform .14s, box-shadow .22s, filter .2s;
    animation:fadeUp .45s both;
  }
  .next-day-cta:hover{transform:translateY(-2px); box-shadow:0 20px 42px -12px rgba(230,57,155,.7); filter:saturate(112%)}
  .next-day-cta:active{transform:translateY(0)}
  .next-day-cta:focus-visible{outline:none; box-shadow:0 0 0 4px rgba(124,92,255,.22), 0 14px 32px -12px rgba(230,57,155,.62)}

  .today-wrap{margin-top:26px}
  .today{
    position:relative; border-radius:28px; overflow:hidden;
    background:var(--surface); border:1px solid var(--line);
    box-shadow:var(--shadow-lg);
    animation:fadeUp .55s .05s both;
  }
  .today-banner{
    position:relative; padding:26px 32px 22px;
    background:
      radial-gradient(140% 120% at 0% 0%, color-mix(in srgb,var(--accent) 26%, #fff), transparent 62%),
      linear-gradient(135deg, color-mix(in srgb,var(--accent) 16%, #fff), color-mix(in srgb,var(--accent) 7%, #fff));
    border-bottom:1px solid var(--line);
  }
  .today-banner::after{
    content:""; position:absolute; right:-40px; top:-40px; width:190px; height:190px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, color-mix(in srgb,var(--accent) 40%,#fff), transparent 70%);
    opacity:.55; pointer-events:none;
  }
  .today-main{padding:24px 32px 30px}
  .trackpill{
    display:inline-flex; align-items:center; gap:9px; padding:7px 14px 7px 9px; border-radius:99px;
    font:800 11px var(--sans); letter-spacing:.04em;
    color:var(--accent); background:#fff;
    box-shadow:0 6px 16px -8px color-mix(in srgb,var(--accent) 60%, transparent), inset 0 0 0 1px color-mix(in srgb,var(--accent) 22%, transparent);
  }
  .trackpill .k{
    width:24px; height:24px; border-radius:50%; display:grid; place-items:center; font-size:14px; line-height:1;
    background:color-mix(in srgb,var(--accent) 18%,#fff);
  }
  .today-eyebrow{font:700 10.5px var(--mono); letter-spacing:.18em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:12px}
  .today-title{
    font-family:var(--display); font-weight:800; font-size:clamp(25px,3.4vw,38px); line-height:1.14;
    margin:14px 0 0; color:var(--ink); letter-spacing:-.02em;
  }
  .warm{
    display:flex; align-items:flex-start; gap:11px; margin-bottom:22px; padding:14px 16px;
    border-radius:16px; background:color-mix(in srgb,var(--amber) 12%,#fff);
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--amber) 22%, transparent);
    font-size:14px; color:var(--ink-soft);
  }
  .warm .warm-i{font-size:18px; line-height:1.3}
  .warm .muted{display:block; font:800 10px var(--mono); letter-spacing:.14em; text-transform:uppercase; color:var(--amber); margin-bottom:3px}

  .tasks-head{font:800 12px var(--sans); color:var(--ink-soft); margin:0 0 12px; display:flex; align-items:center; gap:8px}
  .tasks-head::after{content:""; flex:1; height:1px; background:var(--line)}

  .task{
    position:relative; display:flex; gap:14px; align-items:center; padding:14px 16px; margin-bottom:10px;
    border-radius:16px; cursor:pointer; user-select:text;
    background:var(--surface-2); border:1.5px solid transparent;
    transition:border-color .2s, background .2s, transform .12s, box-shadow .2s; animation:fadeUp .45s both;
  }
  .task:hover{border-color:color-mix(in srgb,var(--accent) 40%, transparent); background:#fff; box-shadow:var(--shadow-sm); transform:translateX(3px)}
  .task input{position:absolute; opacity:0; width:0; height:0}
  .task .box{
    flex:0 0 24px; width:24px; height:24px; border-radius:8px;
    border:2px solid var(--ink-faint); background:#fff; display:grid; place-items:center; transition:.2s;
  }
  .task .box::after{content:"✓"; font-size:15px; font-weight:800; color:#fff; opacity:0; transform:scale(.3); transition:.2s}
  .task.done{background:color-mix(in srgb,var(--accent) 9%,#fff); border-color:color-mix(in srgb,var(--accent) 28%, transparent)}
  .task.done .box{background:linear-gradient(135deg, color-mix(in srgb,var(--accent) 80%,#fff), var(--accent)); border-color:transparent; box-shadow:0 6px 14px -5px color-mix(in srgb,var(--accent) 75%, transparent)}
  .task.done .box::after{opacity:1; transform:scale(1)}
  .task-text{font-size:14.5px; color:var(--ink); font-weight:600; transition:.2s}
  .task.done .task-text{color:var(--ink-dim); text-decoration:line-through}

  .reflect-block{margin-top:22px}
  .reflect-label{display:flex; align-items:center; gap:9px; margin-bottom:10px; font-size:13px; color:var(--ink-soft); font-weight:600}
  .reflect-label .kanji{font-size:16px}
  textarea{
    width:100%; min-height:82px; resize:vertical; font:inherit; font-weight:500; color:var(--ink);
    background:var(--surface-2); border:1.5px solid var(--line); border-radius:16px; padding:14px 16px; outline:none;
    transition:.2s;
  }
  textarea:focus{background:#fff; border-color:color-mix(in srgb,var(--accent) 55%,var(--line)); box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 14%, transparent)}
  textarea::placeholder{color:var(--ink-faint)}

  .res-row{display:flex; flex-wrap:wrap; gap:10px; margin-top:20px}
  .chip{
    font-size:12.5px; color:var(--ink-soft); padding:8px 13px; border-radius:99px;
    background:var(--bg-tint-2); box-shadow:inset 0 0 0 1px var(--line); font-weight:500;
  }
  .chip b{color:var(--blue); font-weight:800}
  #markReview{margin-top:22px}

  /* rest day */
  .rest-due{margin-top:18px; font-size:15px; color:var(--ink-soft); font-weight:600;
    padding:16px 18px; border-radius:16px; background:color-mix(in srgb,var(--amber) 10%,#fff);
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--amber) 22%, transparent)}
  .rest-due b{color:var(--amber)}

  /* footer note */
  .foot{position:relative; z-index:1; text-align:center; color:var(--ink-faint); font:700 10.5px var(--mono);
    letter-spacing:.16em; text-transform:uppercase; padding:6px 0 40px; max-width:1160px; margin:0 auto}
  #motd{ display:inline-block; transition: opacity .55s ease, transform .55s ease; }
  #motd.motd-out{ opacity:0; transform: translateY(6px); }

  ::selection{background:color-mix(in srgb,var(--fuchsia) 28%, transparent); color:var(--ink)}
  ::-webkit-scrollbar{width:12px; height:12px}
  ::-webkit-scrollbar-thumb{background:#dcdae8; border-radius:99px; border:3px solid transparent; background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--fuchsia) 45%,#dcdae8); background-clip:padding-box}

  @keyframes fadeUp{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}

  /* ---- calendar modal ---- */
  .cal-modal{
    display:none; position:fixed; inset:0; z-index:200;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  .cal-modal.open{display:flex; animation:cal-fade .22s ease both}
  @keyframes cal-fade{from{opacity:0} to{opacity:1}}
  .cal-panel{
    width:min(420px,92vw); border-radius:26px; padding:22px 22px 24px;
    background:var(--surface); border:1px solid var(--line);
    box-shadow:var(--shadow-lg);
    animation:fadeUp .3s both;
  }
  .cal-head{
    display:flex; align-items:center; gap:8px; margin-bottom:18px;
  }
  .cal-head #calTitle{
    flex:1; text-align:center; font-family:var(--display); font-weight:800;
    font-size:19px; letter-spacing:-.01em; color:var(--ink);
  }
  .cal-head button{
    width:38px; height:38px; flex:0 0 auto; border-radius:12px; cursor:pointer;
    display:grid; place-items:center; line-height:1;
    font-family:var(--display); font-weight:800; font-size:20px; color:var(--fuchsia);
    background:var(--surface); border:1.5px solid var(--line); box-shadow:var(--shadow-sm);
    transition:transform .12s, box-shadow .2s, border-color .2s, color .2s, background .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .cal-head button:hover{
    transform:translateY(-1px); color:#fff; border-color:transparent;
    background:linear-gradient(135deg,var(--fuchsia-2),var(--fuchsia) 60%,var(--violet));
    box-shadow:0 12px 26px -12px rgba(230,57,155,.6);
  }
  .cal-head button:active{transform:translateY(0)}
  .cal-head #calClose{margin-left:4px; font-size:16px}
  .cal-dow{
    display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:8px;
  }
  .cal-dow span{
    text-align:center; font:700 10px var(--mono); letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-faint);
  }
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px}
  .cday{
    aspect-ratio:1/1; border-radius:12px; display:grid; place-items:center;
    font:700 13.5px var(--sans); color:var(--ink-soft);
    background:var(--surface-2); box-shadow:inset 0 0 0 1px var(--line-soft);
    transition:transform .14s, box-shadow .2s, background .2s, color .2s;
  }
  .cday.other{color:var(--ink-faint); background:transparent; box-shadow:none; opacity:.55}
  .cday.done{
    color:#fff;
    background:linear-gradient(135deg,var(--fuchsia-2),var(--fuchsia) 60%,var(--violet));
    box-shadow:0 6px 16px -8px rgba(230,57,155,.6), inset 0 1px 0 rgba(255,255,255,.3);
  }
  .cday.today{
    box-shadow:0 0 0 2px var(--fuchsia), inset 0 0 0 1px var(--line-soft);
    color:var(--fuchsia); font-weight:800;
  }
  .cday.today.done{box-shadow:0 0 0 2px var(--violet), 0 6px 16px -8px rgba(230,57,155,.6); color:#fff}
  .cday.other.done{opacity:.42}

  /* ---- trophies modal ---- */
  .tr-modal{
    display:none; position:fixed; inset:0; z-index:200;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  .tr-modal.open{display:flex; animation:cal-fade .22s ease both}
  .tr-panel{
    width:min(560px,92vw); max-height:86vh; overflow:auto; border-radius:26px; padding:22px 22px 24px;
    background:var(--surface); border:1px solid var(--line);
    box-shadow:var(--shadow-lg);
    animation:fadeUp .3s both;
  }
  .tr-head{display:flex; align-items:center; gap:8px; margin-bottom:18px}
  .tr-head #trophiesTitle{
    flex:1; font-family:var(--display); font-weight:800;
    font-size:19px; letter-spacing:-.01em; color:var(--ink);
  }
  .tr-head #trophiesClose{
    width:38px; height:38px; flex:0 0 auto; border-radius:12px; cursor:pointer;
    display:grid; place-items:center; line-height:1;
    font-family:var(--display); font-weight:800; font-size:16px; color:var(--fuchsia);
    background:var(--surface); border:1.5px solid var(--line); box-shadow:var(--shadow-sm);
    transition:transform .12s, box-shadow .2s, border-color .2s, color .2s, background .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .tr-head #trophiesClose:hover{
    transform:translateY(-1px); color:#fff; border-color:transparent;
    background:linear-gradient(135deg,var(--fuchsia-2),var(--fuchsia) 60%,var(--violet));
    box-shadow:0 12px 26px -12px rgba(230,57,155,.6);
  }
  .tr-head #trophiesClose:active{transform:translateY(0)}
  .tr-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px}
  .tr-grid .badge{
    --accent:var(--amber);
    position:relative;
    display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center;
    padding:16px 12px 14px; border-radius:18px; transition:transform .15s, box-shadow .2s, filter .2s;
  }
  /* custom tooltip — theme-flavored, shows what the trophy is for */
  .tr-grid .badge[data-tip]::after{
    content:attr(data-tip);
    position:absolute; left:50%; bottom:calc(100% + 9px);
    transform:translateX(-50%) translateY(4px);
    width:max-content; max-width:210px; white-space:normal; text-align:center;
    padding:9px 12px; border-radius:12px;
    font-family:var(--sans); font-weight:600; font-size:12px; line-height:1.4;
    z-index:60; opacity:0; pointer-events:none;
    transition:opacity .16s ease, transform .16s ease;
    color:#fff; filter:none;
    background:linear-gradient(135deg, color-mix(in srgb,var(--ink) 96%, var(--fuchsia)), color-mix(in srgb,var(--ink) 90%, var(--violet)));
    box-shadow:var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,.14);
  }
  /* little arrow under the tooltip */
  .tr-grid .badge[data-tip]::before{
    content:""; position:absolute; left:50%; bottom:calc(100% + 3px);
    transform:translateX(-50%) translateY(4px) rotate(45deg);
    width:11px; height:11px; border-radius:2px; z-index:61;
    opacity:0; pointer-events:none;
    transition:opacity .16s ease, transform .16s ease;
    background:color-mix(in srgb,var(--ink) 90%, var(--violet));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.10);
  }
  .tr-grid .badge[data-tip]:hover::after{ opacity:1; transform:translateX(-50%) translateY(0); }
  .tr-grid .badge[data-tip]:hover::before{ opacity:1; transform:translateX(-50%) translateY(0) rotate(45deg); }
  /* top-row badges: flip tooltip below so it never gets clipped by the panel top */
  .tr-grid .badge.tip-below[data-tip]::after{
    bottom:auto; top:calc(100% + 9px);
    transform:translateX(-50%) translateY(-4px);
  }
  .tr-grid .badge.tip-below[data-tip]::before{
    bottom:auto; top:calc(100% + 3px);
    transform:translateX(-50%) translateY(-4px) rotate(45deg);
  }
  .tr-grid .badge.tip-below[data-tip]:hover::after{ transform:translateX(-50%) translateY(0); }
  .tr-grid .badge.tip-below[data-tip]:hover::before{ transform:translateX(-50%) translateY(0) rotate(45deg); }
  .tr-grid .badge .bi{font-size:30px; line-height:1}
  .tr-grid .badge .bt{font:800 12px var(--sans); letter-spacing:.01em; color:var(--ink-soft); line-height:1.25}
  .tr-grid .badge.on{
    background:linear-gradient(135deg, color-mix(in srgb,var(--accent) 18%,#fff), color-mix(in srgb,var(--accent) 8%,#fff));
    box-shadow:0 10px 24px -12px color-mix(in srgb,var(--accent) 70%, transparent), inset 0 0 0 1px color-mix(in srgb,var(--accent) 26%, transparent);
  }
  .tr-grid .badge.on .bt{color:var(--ink)}
  .tr-grid .badge.on:hover{transform:translateY(-3px) scale(1.03)}
  .tr-grid .badge.off{
    background:var(--surface-2); box-shadow:inset 0 0 0 1px var(--line-soft);
  }
  /* dim only the badge contents, not the tooltip pseudo-elements */
  .tr-grid .badge.off .bi,
  .tr-grid .badge.off .bt{ filter:grayscale(1); opacity:.5; }

  /* comeback banner */
  #comeback{
    margin-top:16px; padding:14px 18px; border-radius:16px; font-size:14px; color:var(--ink-soft); font-weight:600;
    background:color-mix(in srgb,var(--teal) 12%,#fff);
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--teal) 24%, transparent);
    animation:fadeUp .45s both;
  }
  #comeback b{color:var(--teal)}

  /* celebrate: confetti overlay */
  .celebrate-layer{position:fixed; inset:0; z-index:60; pointer-events:none; overflow:hidden}
  .confetti{
    position:absolute; top:-14px; width:10px; height:14px; border-radius:2px; opacity:0;
    animation:confetti-fall var(--dur,2.4s) cubic-bezier(.3,.6,.5,1) forwards;
  }
  @keyframes confetti-fall{
    0%{opacity:0; transform:translateY(-10vh) rotate(0deg)}
    8%{opacity:1}
    100%{opacity:0; transform:translateY(108vh) rotate(var(--spin,540deg))}
  }
  .celebrate-flash{
    position:fixed; inset:0; z-index:55; pointer-events:none;
    background:radial-gradient(60% 50% at 50% 42%, color-mix(in srgb,var(--fuchsia) 30%, transparent), transparent 70%);
    animation:cel-flash .9s ease-out forwards;
  }
  @keyframes cel-flash{0%{opacity:0}25%{opacity:1}100%{opacity:0}}

  /* toasts */
  .toast-stack{position:fixed; left:50%; bottom:30px; transform:translateX(-50%); z-index:70; display:flex; flex-direction:column; gap:10px; align-items:center; pointer-events:none; width:max-content; max-width:92vw}
  .toast{
    display:flex; align-items:center; gap:13px; padding:13px 20px 13px 14px; border-radius:18px;
    background:rgba(255,255,255,.94); backdrop-filter:saturate(150%) blur(10px); -webkit-backdrop-filter:saturate(150%) blur(10px);
    box-shadow:var(--shadow-lg), inset 0 0 0 1px var(--line);
    color:var(--ink); font-weight:600; font-size:14px; pointer-events:auto;
    animation:toast-in .4s cubic-bezier(.22,1,.36,1) both;
  }
  .toast.leaving{animation:toast-out .35s ease forwards}
  .toast .t-ic{
    flex:0 0 auto; width:40px; height:40px; border-radius:13px; display:grid; place-items:center; font-size:21px; line-height:1;
    background:linear-gradient(135deg,color-mix(in srgb,var(--fuchsia) 16%,#fff),color-mix(in srgb,var(--violet) 12%,#fff));
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--fuchsia) 22%, transparent);
  }
  .toast .t-body{display:flex; flex-direction:column; gap:2px; min-width:0}
  .toast .t-kicker{font:800 9.5px var(--mono); letter-spacing:.16em; text-transform:uppercase; color:var(--fuchsia)}
  .toast .t-text{color:var(--ink-soft); font-size:13.5px; line-height:1.4}
  .toast.surprise .t-ic{
    background:linear-gradient(135deg,color-mix(in srgb,var(--teal) 18%,#fff),color-mix(in srgb,var(--blue) 12%,#fff));
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--teal) 24%, transparent);
  }
  .toast.surprise .t-kicker{color:var(--teal)}
  @keyframes toast-in{from{opacity:0; transform:translateY(18px) scale(.96)} to{opacity:1; transform:none}}
  @keyframes toast-out{to{opacity:0; transform:translateY(12px) scale(.97)}}

  /* trophy toast — extra joyful: pop + slide-up, sparkly icon, gentle bounce */
  .toast.trophy{
    position:relative; overflow:visible; padding-right:24px;
    background:linear-gradient(135deg, rgba(255,255,255,.97), color-mix(in srgb,var(--amber) 10%,#fff));
    box-shadow:0 26px 60px -22px rgba(255,159,28,.5), inset 0 0 0 1px color-mix(in srgb,var(--amber) 30%, transparent);
    animation:trophy-pop .55s cubic-bezier(.18,1.4,.4,1) both;
  }
  .toast.trophy .t-ic{
    background:linear-gradient(135deg,color-mix(in srgb,var(--amber) 26%,#fff),color-mix(in srgb,var(--coral) 18%,#fff));
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--amber) 34%, transparent), 0 8px 18px -8px rgba(255,93,115,.5);
    animation:trophy-bob 1s ease-in-out .35s 2;
  }
  .toast.trophy .t-kicker{
    background:linear-gradient(92deg,var(--amber),var(--coral) 60%,var(--fuchsia));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .toast.trophy .t-text{color:var(--ink); font-weight:700}
  @keyframes trophy-pop{
    0%{opacity:0; transform:translateY(26px) scale(.82)}
    55%{opacity:1; transform:translateY(-6px) scale(1.04)}
    75%{transform:translateY(0) scale(.99)}
    100%{opacity:1; transform:none}
  }
  @keyframes trophy-bob{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-5px) rotate(-7deg)}60%{transform:translateY(-2px) rotate(6deg)}}
  /* sparkles around the trophy toast */
  .toast.trophy .spark{position:absolute; font-size:13px; line-height:1; pointer-events:none; opacity:0;
    animation:spark-pop 1.4s ease-out both}
  .toast.trophy .spark.s1{left:6px;  top:-8px;  animation-delay:.18s}
  .toast.trophy .spark.s2{right:10px; top:-10px; animation-delay:.3s}
  .toast.trophy .spark.s3{left:46px; bottom:-9px; animation-delay:.42s}
  .toast.trophy .spark.s4{right:24px; bottom:-8px; animation-delay:.24s}
  @keyframes spark-pop{
    0%{opacity:0; transform:scale(.4) translateY(4px)}
    35%{opacity:1; transform:scale(1.15) translateY(-4px)}
    100%{opacity:0; transform:scale(.7) translateY(-12px)}
  }

  @media (max-width:640px){
    .topbar{padding:13px 18px}
    .wrap{padding:24px 18px 64px}
    .today-banner,.today-main{padding-left:22px; padding-right:22px}
    .day-rail{gap:8px}
    .day-nav{width:38px; height:38px; border-radius:13px; font-size:20px}
    .next-day-cta{width:100%; justify-content:center; padding:13px 20px; font-size:14px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="brand-logo"><span class="sun"></span></span>
    <span class="brand-txt">
      <span class="brand-name">Sunrise</span>
      <span class="brand-sub" id="phaseLabel"></span>
    </span>
  </div>
  <div class="toolbar">
    <label class="field">День <select id="daySelect"></select></label>
    <button class="btn" id="calBtn" type="button" aria-label="Календарь">📅</button>
    <button class="btn" id="trophiesBtn" type="button" aria-label="Трофеи">🏆</button>
    <button class="btn" id="exportBtn">Экспорт</button>
    <button class="btn" id="importBtn">Импорт</button>
    <input type="file" id="importFile" accept="application/json" hidden />
  </div>
</header>

<main class="wrap">
  <section class="dash" id="dashboard"></section>

  <div id="comeback" style="display:none"></div>
  <div class="day-rail">
    <button class="day-nav day-prev" id="prevDay" type="button" aria-label="Предыдущий день">‹</button>
    <section class="today-wrap"><article class="today" id="todayCard"></article></section>
    <button class="day-nav day-next" id="nextDay" type="button" aria-label="Следующий день">›</button>
  </div>
</main>
<div class="foot"><span id="motd">継続は力なり · постоянство — это сила</span> · sunrise tracker</div>

<div class="cal-modal" id="calModal">
  <div class="cal-panel">
    <div class="cal-head">
      <button id="calPrev" type="button">‹</button>
      <div id="calTitle"></div>
      <button id="calNext" type="button">›</button>
      <button id="calClose" type="button">✕</button>
    </div>
    <div class="cal-dow"><span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<div class="tr-modal" id="trophiesModal">
  <div class="tr-panel">
    <div class="tr-head">
      <div id="trophiesTitle"></div>
      <button id="trophiesClose" type="button">✕</button>
    </div>
    <div class="tr-grid" id="trophiesGrid"></div>
  </div>
</div>

<script src="curriculum.js"></script>
<script src="logic.js"></script>
<script>
const L = window.RoadmapLogic, C = window.Curriculum;
const KEY = 'devRoadmapState.v1';
const allDays = L.allDays(C);

const TRACKS = {
  dsa:       { label:'Алгоритмы',     kanji:'🧩', color:'var(--fuchsia)' },
  js:        { label:'JavaScript',    kanji:'⚡', color:'var(--amber)' },
  ts:        { label:'TypeScript',    kanji:'🔷', color:'var(--blue)' },
  node:      { label:'Node.js',       kanji:'🌿', color:'var(--lime)' },
  sysdesign: { label:'System Design', kanji:'🧭', color:'var(--violet)' },
  patterns:  { label:'Паттерны',      kanji:'🎯', color:'var(--coral)' },
  distsys:   { label:'Распределённые',kanji:'🛰️', color:'var(--sky)' },
  db:        { label:'Базы данных',   kanji:'🗄️', color:'var(--teal)' },
  cs:        { label:'CS-фундамент',  kanji:'🧠', color:'var(--fuchsia-2)' },
  rest:      { label:'Отдых',         kanji:'🌙', color:'var(--amber)' },
};
const trackMeta = (t) => TRACKS[t] || { label:t, kanji:'•', color:'var(--fuchsia)' };

function todayStr(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function loadState(){
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return L.createInitialState();
    const res = L.parseImported(raw);
    return res.ok ? res.state : L.createInitialState();
  } catch(e){ return L.createInitialState(); }
}
function saveState(){
  try { localStorage.setItem(KEY, L.serializeState(state)); } catch(e){}
}

let state = loadState();

function defaultDayId(){
  const firstOpen = allDays.find(d => d.track!=='rest' && !L.isDayComplete(C, state, d.id));
  return (firstOpen || allDays[allDays.length-1]).id;
}
let currentDayId = defaultDayId();

function dowName(dow){ return ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'][dow-1]; }

function renderDaySelect(){
  const sel = document.getElementById('daySelect');
  sel.innerHTML = allDays.map(d =>
    `<option value="${d.id}" ${d.id===currentDayId?'selected':''}>Нед ${d.week} · ${dowName(d.dow)} · ${esc(trackMeta(d.track).label)}</option>`
  ).join('');
  sel.onchange = () => { currentDayId = sel.value; renderAll(); };
}

function dayIndex(){ return allDays.findIndex(function(d){ return d.id === currentDayId; }); }
function goToDay(delta){
  var i = dayIndex();
  var j = Math.min(Math.max(i + delta, 0), allDays.length - 1);
  if (j !== i){ currentDayId = allDays[j].id; renderAll(); if (window.scrollTo){ try{ window.scrollTo({top:0,behavior:'smooth'}); }catch(e){} } }
}

function renderToday(){
  const d = L.getDay(C, currentDayId);
  const el = document.getElementById('todayCard');
  const m = trackMeta(d.track);
  el.style.setProperty('--accent', m.color);
  document.getElementById('phaseLabel').textContent = `Фаза ${L.phaseOfWeek(d.week)} · Неделя ${d.week}`;

  if (d.track === 'rest'){
    const due = L.getDueReviews(state, todayStr());
    el.style.setProperty('--accent', 'var(--amber)');
    el.innerHTML = `
      <div class="today-banner">
        <span class="trackpill"><span class="k">🌙</span> ${esc(m.label)}</span>
      </div>
      <div class="today-main">
        <div class="today-eyebrow">День отдыха</div>
        <h2 class="today-title">${esc(d.title)}</h2>
        <p class="warm"><span class="warm-i">🌙</span> <span><span class="muted">сегодня</span>${esc(d.reflectPrompt)}</span></p>
        <div class="rest-due">${due.length ? 'К повтору сегодня — <b>'+esc(due.join(' · '))+'</b>' : 'Повторов на сегодня нет. Отдых заслужен 🌿'}</div>
        ${ ((d.track==='rest' || L.isDayComplete(C, state, currentDayId)) && dayIndex() < allDays.length-1) ? '<button class="next-day-cta" id="nextDayCta" type="button">Следующий день →</button>' : '' }
      </div>`;
    (function(){
      var i = dayIndex(), last = allDays.length - 1;
      var pv = document.getElementById('prevDay'), nx = document.getElementById('nextDay');
      if (pv) pv.disabled = (i <= 0);
      if (nx) nx.disabled = (i >= last);
      var cta = document.getElementById('nextDayCta');
      if (cta) cta.onclick = function(){ goToDay(1); };
    })();
    return;
  }

  const st = state.days[currentDayId] || { tasks:{}, reflection:'' };
  el.innerHTML = `
    <div class="today-banner">
      <span class="trackpill"><span class="k">${m.kanji}</span> ${esc(m.label)}</span>
      <h2 class="today-title">${esc(d.title)}</h2>
    </div>
    <div class="today-main">
      <div class="warm"><span class="warm-i">✦</span> <span><span class="muted">Разминка</span>${esc(d.warmup)}</span></div>
      <div class="tasks-head">Задачи на сегодня</div>
      <div class="tasks" id="taskList"></div>
      <div class="reflect-block">
        <label class="reflect-label" for="reflect"><span class="kanji">📝</span> Рефлексия — ${esc(d.reflectPrompt)}</label>
        <textarea id="reflect" placeholder="Короткая заметка...">${esc(st.reflection||'')}</textarea>
      </div>
      ${d.resources.length ? '<div class="res-row">'+d.resources.map(r=>`<span class="chip"><b>${esc(r.label)}</b> ${esc(r.note)}</span>`).join('')+'</div>' : ''}
      ${d.track==='dsa' ? '<button class="btn primary" id="markReview">＋ Запланировать повтор паттерна недели</button>' : ''}
      ${ ((d.track==='rest' || L.isDayComplete(C, state, currentDayId)) && dayIndex() < allDays.length-1) ? '<button class="next-day-cta" id="nextDayCta" type="button">Следующий день →</button>' : '' }
    </div>`;

  const list = document.getElementById('taskList');
  list.innerHTML = d.tasks.map((t,i) => {
    const done = !!(st.tasks && st.tasks[t.id]);
    return `<label class="task ${done?'done':''}" style="animation-delay:${i*55}ms">
      <input type="checkbox" id="cb_${t.id}" ${done?'checked':''}/>
      <span class="box"></span><span class="task-text">${esc(t.text)}</span></label>`;
  }).join('');
  d.tasks.forEach(t => {
    document.getElementById('cb_'+t.id).onchange = (e) => {
      const wasComplete = L.isDayComplete(C, state, currentDayId);
      state = L.setTaskDone(C, state, currentDayId, t.id, e.target.checked, todayStr(), new Date().getHours());
      if (!wasComplete && L.isDayComplete(C, state, currentDayId)) onDayCompleted();
      saveState(); renderAll();
    };
  });
  document.getElementById('reflect').oninput = (e) => {
    state = L.setReflection(state, currentDayId, e.target.value); saveState();
  };
  if (d.track==='dsa'){
    document.getElementById('markReview').onclick = () => {
      const item = `w${d.week}-${d.title}`;
      state = L.scheduleReview(state, item, todayStr()); saveState(); renderAll();
    };
  }

  (function(){
    var i = dayIndex(), last = allDays.length - 1;
    var pv = document.getElementById('prevDay'), nx = document.getElementById('nextDay');
    if (pv) pv.disabled = (i <= 0);
    if (nx) nx.disabled = (i >= last);
    var cta = document.getElementById('nextDayCta');
    if (cta) cta.onclick = function(){ goToDay(1); };
  })();
}

function renderAll(){ renderDaySelect(); renderToday(); renderDashboard(); renderTrophies(); renderComeback(); }

/* ---- dopamine features ---- */
function completedCount(){ return Object.keys(state.days).filter(function(id){return state.days[id].completedAt;}).length; }
function onDayCompleted(){
  celebrate();
  var res = L.syncBadges(C, state, todayStr());
  state = res.state;
  if (res.unlocked.length) showBadgeToast(res.unlocked);
  if (Math.random() < 0.12){
    var msg = L.SURPRISES[Math.floor(Math.random()*L.SURPRISES.length)];
    state.lastSurprise = { text: msg, at: todayStr() };
    showSurprise(msg);
  }
}
var calOffset = 0;
function _mondayIndex(dateStr){ return ((L.diffDays('2024-01-01', dateStr)) % 7 + 7) % 7; }  // 2024-01-01 = понедельник
function renderCalendar(){
  var grid = document.getElementById('calGrid'); if(!grid) return;
  var done = {}; L.completedDates(state).forEach(function(d){ done[d]=1; });
  var today = todayStr();
  var p = today.split('-'); var y = +p[0], m = +p[1];
  m += calOffset; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;}
  var mm = (m<10?'0':'')+m;
  var first = y+'-'+mm+'-01';
  var lead = _mondayIndex(first);
  var start = L.addDays(first, -lead);
  var cells = '';
  for (var i=0;i<42;i++){
    var d = L.addDays(start, i);
    var cls = 'cday';
    if (d.slice(0,7) !== first.slice(0,7)) cls += ' other';
    if (done[d]) cls += ' done';
    if (d === today) cls += ' today';
    cells += '<span class="'+cls+'">'+(+d.slice(8,10))+'</span>';
  }
  grid.innerHTML = cells;
  var MN = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  var tt = document.getElementById('calTitle'); if(tt) tt.textContent = MN[m-1]+' '+y;
}
function renderComeback(){
  var cb = document.getElementById('comeback'); if(!cb) return;
  var unlocked = L.evaluateBadges(C, state, todayStr()).find(function(b){return b.id==='comeback';}).unlocked;
  if (unlocked && L.computeStreak(state, todayStr()) <= 2){
    cb.style.display=''; cb.innerHTML = '🩹 С возвращением — всего пройдено <b>'+completedCount()+'</b> дней. Продолжаем.';
  } else { cb.style.display='none'; }
}

/* ---- visuals (theme-flavored, no external libs) ---- */
function _accentColors(){
  return ['#e6399b','#ff4fb8','#7c5cff','#13c2b5','#ff9f1c','#ff5d73','#3d8bff','#3ec96b','#22b8e6'];
}
function celebrate(){
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  var layer = document.createElement('div'); layer.className = 'celebrate-layer';
  var flash = document.createElement('div'); flash.className = 'celebrate-flash';
  document.body.appendChild(flash);
  document.body.appendChild(layer);
  var colors = _accentColors();
  var N = 80;
  for (var i=0;i<N;i++){
    var p = document.createElement('span'); p.className = 'confetti';
    var c = colors[i % colors.length];
    var dur = (1.9 + Math.random()*1.6).toFixed(2) + 's';
    var spin = (Math.random()*720 - 360 + 540).toFixed(0) + 'deg';
    p.style.left = (Math.random()*100) + 'vw';
    p.style.background = c;
    p.style.setProperty('--dur', dur);
    p.style.setProperty('--spin', spin);
    p.style.animationDelay = (Math.random()*0.35).toFixed(2) + 's';
    if (i % 4 === 0){ p.style.width = '8px'; p.style.height = '8px'; p.style.borderRadius = '50%'; }
    layer.appendChild(p);
  }
  setTimeout(function(){ if(flash.parentNode) flash.parentNode.removeChild(flash); }, 1000);
  setTimeout(function(){ if(layer.parentNode) layer.parentNode.removeChild(layer); }, 4200);
}
function _toastStack(){
  var s = document.getElementById('toastStack');
  if (!s){ s = document.createElement('div'); s.id = 'toastStack'; s.className = 'toast-stack'; document.body.appendChild(s); }
  return s;
}
function _pushToast(html, extraClass, ttl){
  var stack = _toastStack();
  var t = document.createElement('div');
  t.className = 'toast' + (extraClass ? ' '+extraClass : '');
  t.innerHTML = html;
  stack.appendChild(t);
  setTimeout(function(){
    t.classList.add('leaving');
    setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 360);
  }, ttl || 3500);
}
function _badgeById(id){
  var b = (L.BADGES || []).find(function(x){return x.id===id;});
  if (b) return b;
  return (L.evaluateBadges(C, state, todayStr())).find(function(x){return x.id===id;}) || null;
}
function showBadgeToast(ids){
  if (!ids || !ids.length) return;
  ids.forEach(function(id, i){
    var b = _badgeById(id);
    var icon = b ? b.icon : '🏆';
    var title = b ? b.title : id;
    setTimeout(function(){
      _pushToast(
        '<span class="spark s1">✦</span><span class="spark s2">✧</span>' +
        '<span class="spark s3">✦</span><span class="spark s4">✧</span>' +
        '<span class="t-ic">'+esc(icon)+'</span>' +
        '<span class="t-body"><span class="t-kicker">🏆 Новый трофей!</span>' +
        '<span class="t-text">'+esc(title)+'</span></span>',
        'trophy', 3500
      );
      _badgeSparkleBurst();
    }, i * 240);
  });
}
function _badgeSparkleBurst(){
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  var layer = document.createElement('div'); layer.className = 'celebrate-layer';
  document.body.appendChild(layer);
  var colors = ['#ff9f1c','#ff5d73','#e6399b','#7c5cff','#ffe27a'];
  for (var i=0;i<26;i++){
    var p = document.createElement('span'); p.className = 'confetti';
    p.style.left = (Math.random()*100) + 'vw';
    p.style.background = colors[i % colors.length];
    p.style.setProperty('--dur', (1.6 + Math.random()*1.2).toFixed(2) + 's');
    p.style.setProperty('--spin', (Math.random()*540 + 180).toFixed(0) + 'deg');
    p.style.animationDelay = (Math.random()*0.25).toFixed(2) + 's';
    if (i % 3 === 0){ p.style.width='8px'; p.style.height='8px'; p.style.borderRadius='50%'; }
    layer.appendChild(p);
  }
  setTimeout(function(){ if(layer.parentNode) layer.parentNode.removeChild(layer); }, 3200);
}
function showSurprise(text){
  _pushToast(
    '<span class="t-ic">✨</span>' +
    '<span class="t-body"><span class="t-kicker">Сюрприз</span>' +
    '<span class="t-text">'+esc(text)+'</span></span>',
    'surprise', 4500
  );
}

function bar(pct){ return `<div class="bar"><i style="width:${pct}%"></i></div>`; }

function renderDashboard(){
  const overall = L.overallProgress(C, state);
  const streak = L.computeStreak(state, todayStr());
  const byPhase = L.progressByPhase(C, state);
  const byTrack = L.progressByTrack(C, state);

  const phaseRows = [1,2,3].map((p) => {
    const x = byPhase[p] || {done:0,total:0,pct:0};
    return `<div class="prow"><span class="lbl"><i></i>Фаза ${p}</span><span class="val">${x.done}/${x.total}</span></div>${bar(x.pct)}`;
  }).join('');

  const trackRows = Object.keys(TRACKS).filter(k => k!=='rest' && byTrack[k]).map(k => {
    const x = byTrack[k];
    return `<div class="prow"><span class="lbl"><i style="background:${TRACKS[k].color}"></i>${esc(TRACKS[k].label)}</span><span class="val">${x.pct}%</span></div>
      <div class="bar"><i style="width:${x.pct}%;background:${TRACKS[k].color}"></i></div>`;
  }).join('');

  document.getElementById('dashboard').innerHTML = `
    <div class="card" style="--accent:var(--fuchsia);animation-delay:0ms">
      <div class="eyebrow"><span class="badge">📈</span> Прогресс <small>всего</small></div>
      <div class="ring" style="--p:${overall.pct}"><div><b>${overall.pct}%</b><small>${overall.done}/${overall.total}</small></div></div>
      <div class="stat-sub" style="text-align:center;margin-top:14px">пройдено дней из 91</div>
    </div>
    <div class="card" style="--accent:var(--coral);animation-delay:70ms">
      <div class="eyebrow"><span class="badge">🔥</span> Серия <small>streak</small></div>
      <div class="flame">🔥</div>
      <div class="streak-num">${streak}</div>
      <div class="stat-sub">${streak===1?'день':(streak>=2&&streak<=4?'дня':'дней')} подряд</div>
    </div>
    <div class="card" style="--accent:var(--violet);animation-delay:140ms">
      <div class="eyebrow"><span class="badge">🪜</span> Фазы <small>этапы</small></div>
      ${phaseRows}
    </div>
    <div class="card" style="--accent:var(--teal);animation-delay:210ms">
      <div class="eyebrow"><span class="badge">🎨</span> Треки <small>области</small></div>
      ${trackRows || '<div class="due-empty">ещё нет данных</div>'}
    </div>
  `;
}

function renderTrophies(){
  var host=document.getElementById('trophiesGrid'); if(!host) return;
  var all=L.evaluateBadges(C, state, todayStr());
  var got=all.filter(function(b){return b.unlocked;}).length;
  var tt=document.getElementById('trophiesTitle'); if(tt) tt.textContent='Трофеи · '+got+'/'+all.length;
  host.innerHTML=all.map(function(b){
    return '<div class="badge '+(b.unlocked?'on':'off')+'" data-tip="'+esc(b.title+' — '+b.desc)+'"><span class="bi">'+b.icon+'</span><span class="bt">'+esc(b.title)+'</span></div>';
  }).join('');
  // first visual row → tooltip below (so it can't be clipped by the panel top)
  (function(){
    var badges = host.querySelectorAll('.badge');
    if (!badges.length) return;
    var topY = badges[0].offsetTop;
    for (var i=0;i<badges.length;i++){
      if (badges[i].offsetTop <= topY + 1) badges[i].classList.add('tip-below');
    }
  })();
}

document.getElementById('prevDay').onclick = function(){ goToDay(-1); };
document.getElementById('nextDay').onclick = function(){ goToDay(1); };
document.getElementById('calBtn').onclick = function(){ calOffset=0; renderCalendar(); document.getElementById('calModal').classList.add('open'); };
document.getElementById('calClose').onclick = function(){ document.getElementById('calModal').classList.remove('open'); };
document.getElementById('calPrev').onclick = function(){ calOffset--; renderCalendar(); };
document.getElementById('calNext').onclick = function(){ calOffset++; renderCalendar(); };
document.getElementById('calModal').onclick = function(e){ if(e.target.id==='calModal') document.getElementById('calModal').classList.remove('open'); };
document.getElementById('trophiesBtn').onclick = function(){ document.getElementById('trophiesModal').classList.add('open'); renderTrophies(); };
document.getElementById('trophiesClose').onclick = function(){ document.getElementById('trophiesModal').classList.remove('open'); };
document.getElementById('trophiesModal').onclick = function(e){ if(e.target.id==='trophiesModal') document.getElementById('trophiesModal').classList.remove('open'); };
document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([L.serializeState(state)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'progress.json';
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const res = L.parseImported(String(reader.result));
    if (!res.ok){ alert('Импорт не удался: ' + res.error + '\nТекущий прогресс не изменён.'); return; }
    state = res.state; saveState(); currentDayId = defaultDayId(); renderAll();
    alert('Прогресс импортирован.');
  };
  reader.readAsText(file);
  e.target.value = '';
};

/* ---- rotating footer motivation (fade) ---- */

  '塵も積もれば山となる · и пылинки, накапливаясь, становятся горой',
  '石の上にも三年 · посиди на камне три года — и камень нагреется',
  '為せば成る · возьмёшься — выйдет',
  '初心忘るべからず · не забывай дух начинающего',
  '雨垂れ石を穿つ · капля камень точит',
  '急がば回れ · спешишь — иди в обход',
  '一歩一歩 · шаг за шагом'
];
var _motdI = 0;
function _rotateMotd(){
  var el = document.getElementById('motd'); if(!el) return;
  el.classList.add('motd-out');
  setTimeout(function(){
    _motdI = (_motdI + 1) % PHRASES.length;
    el.textContent = PHRASES[_motdI];
    el.classList.remove('motd-out');
  }, 600);
}
setInterval(_rotateMotd, 6000);

renderAll();
