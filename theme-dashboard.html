<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sunrise · трекер обучения</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* light, airy base */
    --bg:#fbfbfd;
    --bg-tint-1:#fff1f9;
    --bg-tint-2:#f0f4ff;
    --bg-tint-3:#eafaf6;
    --surface:#ffffff;
    --surface-2:#f7f7fb;

    --ink:#1c1730;
    --ink-soft:#4a4566;
    --ink-dim:#8a86a3;
    --ink-faint:#b4b1c6;
    --line:#ececf4;
    --line-soft:#f2f1f8;

    /* vivid friendly palette */
    --fuchsia:#e6399b;
    --fuchsia-2:#ff4fb8;
    --violet:#7c5cff;
    --teal:#13c2b5;
    --amber:#ff9f1c;
    --coral:#ff5d73;
    --blue:#3d8bff;
    --lime:#3ec96b;
    --sky:#22b8e6;

    --primary:var(--fuchsia);
    --accent:var(--fuchsia);

    --shadow-sm:0 2px 8px rgba(28,23,48,.05);
    --shadow-md:0 10px 30px -14px rgba(28,23,48,.18);
    --shadow-lg:0 26px 60px -28px rgba(28,23,48,.26);

    --display:"Sora","Plus Jakarta Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
    --sans:"Plus Jakarta Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"JetBrains Mono","SFMono-Regular",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; min-height:100vh; color:var(--ink);
    font-family:var(--sans); font-size:15px; line-height:1.55;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    background:var(--bg);
    background-image:
      radial-gradient(820px 520px at 8% -8%, rgba(230,57,155,.13), transparent 60%),
      radial-gradient(760px 520px at 96% -4%, rgba(124,92,255,.12), transparent 58%),
      radial-gradient(680px 480px at 50% 108%, rgba(19,194,181,.10), transparent 60%);
    background-attachment:fixed;
  }
  /* faint dotted texture */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;
    background-image:radial-gradient(rgba(124,92,255,.10) 1px, transparent 1px);
    background-size:26px 26px;
    -webkit-mask-image:radial-gradient(900px 700px at 50% -4%, #000 30%, transparent 80%);
            mask-image:radial-gradient(900px 700px at 50% -4%, #000 30%, transparent 80%);
  }

  /* ---- top bar ---- */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap;
    padding:16px 30px;
    background:rgba(251,251,253,.78);
    backdrop-filter:saturate(150%) blur(14px); -webkit-backdrop-filter:saturate(150%) blur(14px);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:14px}
  .brand-logo{
    width:42px; height:42px; border-radius:14px; flex:0 0 auto; position:relative;
    background:linear-gradient(135deg,var(--fuchsia-2),var(--fuchsia) 55%,var(--violet));
    box-shadow:0 8px 22px -8px rgba(230,57,155,.7), inset 0 1px 0 rgba(255,255,255,.5);
    display:grid; place-items:center; overflow:hidden;
  }
  .brand-logo .sun{
    width:18px; height:18px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #ffe27a 40%, #ffb13d);
    box-shadow:0 0 0 4px rgba(255,255,255,.28), 0 0 16px rgba(255,225,120,.9);
  }
  .brand-logo::after{
    content:""; position:absolute; left:-6px; right:-6px; bottom:-2px; height:42%;
    background:linear-gradient(180deg, transparent, rgba(255,255,255,.22));
  }
  .brand-txt{display:flex; flex-direction:column; line-height:1}
  .brand-name{
    font-family:var(--display); font-weight:800; font-size:21px; letter-spacing:-.01em;
    background:linear-gradient(92deg,var(--fuchsia),var(--violet));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .brand-sub{
    font:600 10px var(--mono); color:var(--ink-dim); letter-spacing:.16em;
    text-transform:uppercase; margin-top:5px;
  }
  .toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .field{
    display:flex; align-items:center; gap:8px; font:700 10px var(--mono); color:var(--ink-dim);
    letter-spacing:.12em; text-transform:uppercase;
  }
  select{
    font-family:var(--sans); font-weight:600; font-size:13px; color:var(--ink);
    background:var(--surface); border:1.5px solid var(--line); border-radius:12px; padding:9px 12px;
    outline:none; transition:.18s; box-shadow:var(--shadow-sm); cursor:pointer; max-width:62vw;
  }
  select:hover{border-color:color-mix(in srgb,var(--fuchsia) 50%,var(--line))}
  select:focus{border-color:var(--fuchsia); box-shadow:0 0 0 4px rgba(230,57,155,.14)}
  .btn{
    font-family:var(--sans); font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap;
    border-radius:12px; padding:10px 16px; transition:transform .12s, box-shadow .2s, border-color .2s, background .2s, color .2s;
    border:1.5px solid var(--line); background:var(--surface); color:var(--ink-soft); box-shadow:var(--shadow-sm);
  }
  .btn:hover{transform:translateY(-1px); border-color:color-mix(in srgb,var(--fuchsia) 45%,var(--line)); color:var(--fuchsia)}
  .btn:active{transform:translateY(0)}
  .btn.primary{
    border-color:transparent; color:#fff;
    background:linear-gradient(135deg,var(--fuchsia-2),var(--fuchsia) 60%,var(--violet));
    box-shadow:0 10px 26px -10px rgba(230,57,155,.65), inset 0 1px 0 rgba(255,255,255,.35);
  }
  .btn.primary:hover{color:#fff; box-shadow:0 16px 34px -10px rgba(230,57,155,.7)}

  /* ---- layout ---- */
  .wrap{position:relative; z-index:1; max-width:1160px; margin:0 auto; padding:34px 28px 80px}
  .dash{display:grid; grid-template-columns:repeat(auto-fit,minmax(216px,1fr)); gap:18px}

  /* ---- cards ---- */
  .card{
    position:relative; border-radius:22px; padding:22px;
    background:var(--surface); border:1px solid var(--line);
    box-shadow:var(--shadow-md);
    overflow:hidden; animation:fadeUp .5s both;
    transition:transform .2s ease, box-shadow .25s ease;
  }
  .card::before{ /* soft tinted wash from the card accent */
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background:radial-gradient(120% 90% at 100% 0%, color-mix(in srgb,var(--accent) 14%, transparent), transparent 60%);
  }
  .card:hover{transform:translateY(-4px); box-shadow:var(--shadow-lg)}
  .card>*{position:relative}
  .eyebrow{
    display:flex; align-items:center; gap:9px; margin-bottom:16px;
    font:800 11px var(--sans); letter-spacing:.04em; color:var(--ink-soft);
  }
  .eyebrow .badge{
    width:30px; height:30px; border-radius:10px; flex:0 0 auto; display:grid; place-items:center;
    font-size:15px; line-height:1;
    background:color-mix(in srgb,var(--accent) 16%, #fff);
    color:var(--accent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 22%, transparent);
  }
  .eyebrow small{font:700 9.5px var(--mono); letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); margin-left:auto}
  .stat-sub{color:var(--ink-dim); font-size:12.5px; margin-top:6px; font-weight:500}

  /* progress ring */
  .ring{
    --p:0; width:128px; height:128px; border-radius:50%; display:grid; place-items:center; position:relative;
    background:conic-gradient(var(--accent) calc(var(--p)*3.6deg), color-mix(in srgb,var(--accent) 12%, #fff) 0);
    margin:6px auto 0;
    filter:drop-shadow(0 8px 18px color-mix(in srgb,var(--accent) 30%, transparent));
  }
  .ring::before{content:""; position:absolute; inset:11px; border-radius:50%; background:var(--surface);
    box-shadow:inset 0 0 0 1px var(--line-soft)}
  .ring b{position:relative; font:800 28px var(--display); color:var(--ink); display:block; text-align:center; letter-spacing:-.02em}
  .ring small{position:relative; display:block; text-align:center; color:var(--ink-dim); font:600 11px var(--mono); margin-top:2px}

  /* streak */
  .flame{font-size:40px; line-height:1; filter:drop-shadow(0 6px 12px rgba(255,93,115,.4))}
  .streak-num{font:800 52px/1 var(--display); margin:8px 0 2px; letter-spacing:-.03em;
    background:linear-gradient(135deg,var(--amber),var(--coral) 60%,var(--fuchsia));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}

  /* bars */
  .prow{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:13px 0 6px; font-size:13px}
  .prow .lbl{display:flex; align-items:center; gap:9px; color:var(--ink-soft); font-weight:600}
  .prow .lbl i{width:9px; height:9px; border-radius:4px; background:var(--accent); flex:0 0 auto}
  .prow .val{font:700 11px var(--mono); color:var(--ink-dim)}
  .bar{height:9px; border-radius:99px; background:var(--surface-2); overflow:hidden; box-shadow:inset 0 0 0 1px var(--line-soft)}
  .bar>i{display:block; height:100%; border-radius:99px;
    background:linear-gradient(90deg, color-mix(in srgb,var(--accent) 70%, #fff), var(--accent));
    transition:width .6s cubic-bezier(.22,1,.36,1)}

  .due-list{font-size:13.5px; line-height:1.85; color:var(--ink-soft); font-weight:600}
  .due-list b{color:var(--accent)}
  .due-empty{color:var(--ink-dim); font-size:13px; display:flex; align-items:center; gap:8px; font-weight:500}

  /* ---- today ---- */
  .today-wrap{margin-top:26px}
  .today{
    position:relative; border-radius:28px; overflow:hidden;
    background:var(--surface); border:1px solid var(--line);
    box-shadow:var(--shadow-lg);
    animation:fadeUp .55s .05s both;
  }
  .today-banner{
    position:relative; padding:26px 32px 22px;
    background:
      radial-gradient(140% 120% at 0% 0%, color-mix(in srgb,var(--accent) 26%, #fff), transparent 62%),
      linear-gradient(135deg, color-mix(in srgb,var(--accent) 16%, #fff), color-mix(in srgb,var(--accent) 7%, #fff));
    border-bottom:1px solid var(--line);
  }
  .today-banner::after{
    content:""; position:absolute; right:-40px; top:-40px; width:190px; height:190px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, color-mix(in srgb,var(--accent) 40%,#fff), transparent 70%);
    opacity:.55; pointer-events:none;
  }
  .today-main{padding:24px 32px 30px}
  .trackpill{
    display:inline-flex; align-items:center; gap:9px; padding:7px 14px 7px 9px; border-radius:99px;
    font:800 11px var(--sans); letter-spacing:.04em;
    color:var(--accent); background:#fff;
    box-shadow:0 6px 16px -8px color-mix(in srgb,var(--accent) 60%, transparent), inset 0 0 0 1px color-mix(in srgb,var(--accent) 22%, transparent);
  }
  .trackpill .k{
    width:24px; height:24px; border-radius:50%; display:grid; place-items:center; font-size:14px; line-height:1;
    background:color-mix(in srgb,var(--accent) 18%,#fff);
  }
  .today-eyebrow{font:700 10.5px var(--mono); letter-spacing:.18em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:12px}
  .today-title{
    font-family:var(--display); font-weight:800; font-size:clamp(25px,3.4vw,38px); line-height:1.14;
    margin:14px 0 0; color:var(--ink); letter-spacing:-.02em;
  }
  .warm{
    display:flex; align-items:flex-start; gap:11px; margin-bottom:22px; padding:14px 16px;
    border-radius:16px; background:color-mix(in srgb,var(--amber) 12%,#fff);
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--amber) 22%, transparent);
    font-size:14px; color:var(--ink-soft);
  }
  .warm .warm-i{font-size:18px; line-height:1.3}
  .warm .muted{display:block; font:800 10px var(--mono); letter-spacing:.14em; text-transform:uppercase; color:var(--amber); margin-bottom:3px}

  .tasks-head{font:800 12px var(--sans); color:var(--ink-soft); margin:0 0 12px; display:flex; align-items:center; gap:8px}
  .tasks-head::after{content:""; flex:1; height:1px; background:var(--line)}

  .task{
    position:relative; display:flex; gap:14px; align-items:center; padding:14px 16px; margin-bottom:10px;
    border-radius:16px; cursor:pointer; user-select:none;
    background:var(--surface-2); border:1.5px solid transparent;
    transition:border-color .2s, background .2s, transform .12s, box-shadow .2s; animation:fadeUp .45s both;
  }
  .task:hover{border-color:color-mix(in srgb,var(--accent) 40%, transparent); background:#fff; box-shadow:var(--shadow-sm); transform:translateX(3px)}
  .task input{position:absolute; opacity:0; width:0; height:0}
  .task .box{
    flex:0 0 24px; width:24px; height:24px; border-radius:8px;
    border:2px solid var(--ink-faint); background:#fff; display:grid; place-items:center; transition:.2s;
  }
  .task .box::after{content:"✓"; font-size:15px; font-weight:800; color:#fff; opacity:0; transform:scale(.3); transition:.2s}
  .task.done{background:color-mix(in srgb,var(--accent) 9%,#fff); border-color:color-mix(in srgb,var(--accent) 28%, transparent)}
  .task.done .box{background:linear-gradient(135deg, color-mix(in srgb,var(--accent) 80%,#fff), var(--accent)); border-color:transparent; box-shadow:0 6px 14px -5px color-mix(in srgb,var(--accent) 75%, transparent)}
  .task.done .box::after{opacity:1; transform:scale(1)}
  .task-text{font-size:14.5px; color:var(--ink); font-weight:600; transition:.2s}
  .task.done .task-text{color:var(--ink-dim); text-decoration:line-through}

  .reflect-block{margin-top:22px}
  .reflect-label{display:flex; align-items:center; gap:9px; margin-bottom:10px; font-size:13px; color:var(--ink-soft); font-weight:600}
  .reflect-label .kanji{font-size:16px}
  textarea{
    width:100%; min-height:82px; resize:vertical; font:inherit; font-weight:500; color:var(--ink);
    background:var(--surface-2); border:1.5px solid var(--line); border-radius:16px; padding:14px 16px; outline:none;
    transition:.2s;
  }
  textarea:focus{background:#fff; border-color:color-mix(in srgb,var(--accent) 55%,var(--line)); box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 14%, transparent)}
  textarea::placeholder{color:var(--ink-faint)}

  .res-row{display:flex; flex-wrap:wrap; gap:10px; margin-top:20px}
  .chip{
    font-size:12.5px; color:var(--ink-soft); padding:8px 13px; border-radius:99px;
    background:var(--bg-tint-2); box-shadow:inset 0 0 0 1px var(--line); font-weight:500;
  }
  .chip b{color:var(--blue); font-weight:800}
  #markReview{margin-top:22px}

  /* rest day */
  .rest-due{margin-top:18px; font-size:15px; color:var(--ink-soft); font-weight:600;
    padding:16px 18px; border-radius:16px; background:color-mix(in srgb,var(--amber) 10%,#fff);
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--amber) 22%, transparent)}
  .rest-due b{color:var(--amber)}

  /* footer note */
  .foot{position:relative; z-index:1; text-align:center; color:var(--ink-faint); font:700 10.5px var(--mono);
    letter-spacing:.16em; text-transform:uppercase; padding:6px 0 40px; max-width:1160px; margin:0 auto}

  ::selection{background:color-mix(in srgb,var(--fuchsia) 28%, transparent); color:var(--ink)}
  ::-webkit-scrollbar{width:12px; height:12px}
  ::-webkit-scrollbar-thumb{background:#dcdae8; border-radius:99px; border:3px solid transparent; background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--fuchsia) 45%,#dcdae8); background-clip:padding-box}

  @keyframes fadeUp{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}

  @media (max-width:640px){
    .topbar{padding:13px 18px}
    .wrap{padding:24px 18px 64px}
    .today-banner,.today-main{padding-left:22px; padding-right:22px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="brand-logo"><span class="sun"></span></span>
    <span class="brand-txt">
      <span class="brand-name">Sunrise</span>
      <span class="brand-sub" id="phaseLabel"></span>
    </span>
  </div>
  <div class="toolbar">
    <label class="field">День <select id="daySelect"></select></label>
    <button class="btn" id="exportBtn">Экспорт</button>
    <button class="btn" id="importBtn">Импорт</button>
    <input type="file" id="importFile" accept="application/json" hidden />
  </div>
</header>

<main class="wrap">
  <section class="dash" id="dashboard"></section>
  <section class="today-wrap"><article class="today" id="todayCard"></article></section>
</main>
<div class="foot">маленькие шаги каждый день · sunrise tracker</div>

<script src="curriculum.js"></script>
<script src="logic.js"></script>
<script>
const L = window.RoadmapLogic, C = window.Curriculum;
const KEY = 'devRoadmapState.v1';
const allDays = L.allDays(C);

const TRACKS = {
  dsa:       { label:'Алгоритмы',     kanji:'🧩', color:'var(--fuchsia)' },
  js:        { label:'JavaScript',    kanji:'⚡', color:'var(--amber)' },
  ts:        { label:'TypeScript',    kanji:'🔷', color:'var(--blue)' },
  node:      { label:'Node.js',       kanji:'🌿', color:'var(--lime)' },
  sysdesign: { label:'System Design', kanji:'🧭', color:'var(--violet)' },
  patterns:  { label:'Паттерны',      kanji:'🎯', color:'var(--coral)' },
  distsys:   { label:'Распределённые',kanji:'🛰️', color:'var(--sky)' },
  db:        { label:'Базы данных',   kanji:'🗄️', color:'var(--teal)' },
  cs:        { label:'CS-фундамент',  kanji:'🧠', color:'var(--fuchsia-2)' },
  rest:      { label:'Отдых',         kanji:'🌙', color:'var(--amber)' },
};
const trackMeta = (t) => TRACKS[t] || { label:t, kanji:'•', color:'var(--fuchsia)' };

function todayStr(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function loadState(){
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return L.createInitialState();
    const res = L.parseImported(raw);
    return res.ok ? res.state : L.createInitialState();
  } catch(e){ return L.createInitialState(); }
}
function saveState(){
  try { localStorage.setItem(KEY, L.serializeState(state)); } catch(e){}
}

let state = loadState();

function defaultDayId(){
  const firstOpen = allDays.find(d => d.track!=='rest' && !L.isDayComplete(C, state, d.id));
  return (firstOpen || allDays[allDays.length-1]).id;
}
let currentDayId = defaultDayId();

function dowName(dow){ return ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'][dow-1]; }

function renderDaySelect(){
  const sel = document.getElementById('daySelect');
  sel.innerHTML = allDays.map(d =>
    `<option value="${d.id}" ${d.id===currentDayId?'selected':''}>Нед ${d.week} · ${dowName(d.dow)} · ${esc(trackMeta(d.track).label)}</option>`
  ).join('');
  sel.onchange = () => { currentDayId = sel.value; renderAll(); };
}

function renderToday(){
  const d = L.getDay(C, currentDayId);
  const el = document.getElementById('todayCard');
  const m = trackMeta(d.track);
  el.style.setProperty('--accent', m.color);
  document.getElementById('phaseLabel').textContent = `Фаза ${L.phaseOfWeek(d.week)} · Неделя ${d.week}`;

  if (d.track === 'rest'){
    const due = L.getDueReviews(state, todayStr());
    el.style.setProperty('--accent', 'var(--amber)');
    el.innerHTML = `
      <div class="today-banner">
        <span class="trackpill"><span class="k">🌙</span> ${esc(m.label)}</span>
      </div>
      <div class="today-main">
        <div class="today-eyebrow">День отдыха</div>
        <h2 class="today-title">${esc(d.title)}</h2>
        <p class="warm"><span class="warm-i">🌙</span> <span><span class="muted">сегодня</span>${esc(d.reflectPrompt)}</span></p>
        <div class="rest-due">${due.length ? 'К повтору сегодня — <b>'+esc(due.join(' · '))+'</b>' : 'Повторов на сегодня нет. Отдых заслужен 🌿'}</div>
      </div>`;
    return;
  }

  const st = state.days[currentDayId] || { tasks:{}, reflection:'' };
  el.innerHTML = `
    <div class="today-banner">
      <span class="trackpill"><span class="k">${m.kanji}</span> ${esc(m.label)}</span>
      <h2 class="today-title">${esc(d.title)}</h2>
    </div>
    <div class="today-main">
      <div class="warm"><span class="warm-i">✦</span> <span><span class="muted">Разминка</span>${esc(d.warmup)}</span></div>
      <div class="tasks-head">Задачи на сегодня</div>
      <div class="tasks" id="taskList"></div>
      <div class="reflect-block">
        <label class="reflect-label" for="reflect"><span class="kanji">📝</span> Рефлексия — ${esc(d.reflectPrompt)}</label>
        <textarea id="reflect" placeholder="Короткая заметка...">${esc(st.reflection||'')}</textarea>
      </div>
      ${d.resources.length ? '<div class="res-row">'+d.resources.map(r=>`<span class="chip"><b>${esc(r.label)}</b> ${esc(r.note)}</span>`).join('')+'</div>' : ''}
      ${d.track==='dsa' ? '<button class="btn primary" id="markReview">＋ Запланировать повтор паттерна недели</button>' : ''}
    </div>`;

  const list = document.getElementById('taskList');
  list.innerHTML = d.tasks.map((t,i) => {
    const done = !!(st.tasks && st.tasks[t.id]);
    return `<label class="task ${done?'done':''}" style="animation-delay:${i*55}ms">
      <input type="checkbox" id="cb_${t.id}" ${done?'checked':''}/>
      <span class="box"></span><span class="task-text">${esc(t.text)}</span></label>`;
  }).join('');
  d.tasks.forEach(t => {
    document.getElementById('cb_'+t.id).onchange = (e) => {
      state = L.setTaskDone(state, currentDayId, t.id, e.target.checked, todayStr());
      saveState(); renderAll();
    };
  });
  document.getElementById('reflect').oninput = (e) => {
    state = L.setReflection(state, currentDayId, e.target.value); saveState();
  };
  if (d.track==='dsa'){
    document.getElementById('markReview').onclick = () => {
      const item = `w${d.week}-${d.title}`;
      state = L.scheduleReview(state, item, todayStr()); saveState(); renderAll();
    };
  }
}

function renderAll(){ renderDaySelect(); renderToday(); renderDashboard(); }

function bar(pct){ return `<div class="bar"><i style="width:${pct}%"></i></div>`; }

function renderDashboard(){
  const overall = L.overallProgress(C, state);
  const streak = L.computeStreak(state, todayStr());
  const byPhase = L.progressByPhase(C, state);
  const byTrack = L.progressByTrack(C, state);
  const due = L.getDueReviews(state, todayStr());

  const phaseRows = [1,2,3].map((p) => {
    const x = byPhase[p] || {done:0,total:0,pct:0};
    return `<div class="prow"><span class="lbl"><i></i>Фаза ${p}</span><span class="val">${x.done}/${x.total}</span></div>${bar(x.pct)}`;
  }).join('');

  const trackRows = Object.keys(TRACKS).filter(k => k!=='rest' && byTrack[k]).map(k => {
    const x = byTrack[k];
    return `<div class="prow"><span class="lbl"><i style="background:${TRACKS[k].color}"></i>${esc(TRACKS[k].label)}</span><span class="val">${x.pct}%</span></div>
      <div class="bar"><i style="width:${x.pct}%;background:${TRACKS[k].color}"></i></div>`;
  }).join('');

  document.getElementById('dashboard').innerHTML = `
    <div class="card" style="--accent:var(--fuchsia);animation-delay:0ms">
      <div class="eyebrow"><span class="badge">📈</span> Прогресс <small>всего</small></div>
      <div class="ring" style="--p:${overall.pct}"><div><b>${overall.pct}%</b><small>${overall.done}/${overall.total}</small></div></div>
      <div class="stat-sub" style="text-align:center;margin-top:14px">пройдено дней из 91</div>
    </div>
    <div class="card" style="--accent:var(--coral);animation-delay:70ms">
      <div class="eyebrow"><span class="badge">🔥</span> Серия <small>streak</small></div>
      <div class="flame">🔥</div>
      <div class="streak-num">${streak}</div>
      <div class="stat-sub">${streak===1?'день':(streak>=2&&streak<=4?'дня':'дней')} подряд</div>
    </div>
    <div class="card" style="--accent:var(--violet);animation-delay:140ms">
      <div class="eyebrow"><span class="badge">🪜</span> Фазы <small>этапы</small></div>
      ${phaseRows}
    </div>
    <div class="card" style="--accent:var(--teal);animation-delay:210ms">
      <div class="eyebrow"><span class="badge">🎨</span> Треки <small>области</small></div>
      ${trackRows || '<div class="due-empty">ещё нет данных</div>'}
    </div>
    <div class="card" style="--accent:var(--amber);animation-delay:280ms">
      <div class="eyebrow"><span class="badge">🔁</span> Повторы <small>review</small></div>
      ${due.length ? '<div class="due-list">'+due.map(x=>'· '+esc(x)).join('<br>')+'</div>' : '<div class="due-empty">✨ Пусто — всё чисто</div>'}
    </div>
  `;
}

document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([L.serializeState(state)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'progress.json';
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const res = L.parseImported(String(reader.result));
    if (!res.ok){ alert('Импорт не удался: ' + res.error + '\nТекущий прогресс не изменён.'); return; }
    state = res.state; saveState(); currentDayId = defaultDayId(); renderAll();
    alert('Прогресс импортирован.');
  };
  reader.readAsText(file);
  e.target.value = '';
};
renderAll();
</script>
</body>
</html>
