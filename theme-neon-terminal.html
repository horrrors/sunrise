<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SUNRISE :: term</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=VT323&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#04060a;
    --bg-2:#070b11;
    --panel:#080d14;
    --panel-2:#0b121b;
    --line:#13202b;
    --line-2:#1c2f3d;
    --grid:rgba(54,240,255,.035);

    --cyan:#36f0ff;
    --cyan-dim:#1a8a93;
    --green:#39ff14;
    --amber:#ffb000;
    --red:#ff4d5e;

    --fg:#bfe9ee;
    --fg-2:#5f8a93;
    --fg-3:#37565d;

    --mono:"JetBrains Mono","SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
    --crt:"VT323","JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; min-height:100vh; color:var(--fg);
    font-family:var(--mono); font-size:13.5px; line-height:1.55;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    background:var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px),
      radial-gradient(1200px 700px at 18% -10%, rgba(54,240,255,.06), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(255,176,0,.045), transparent 60%);
    background-size:46px 46px, 46px 46px, 100% 100%, 100% 100%;
  }
  /* CRT scanlines + faint vignette */
  body::before{
    content:""; position:fixed; inset:0; z-index:60; pointer-events:none;
    background:repeating-linear-gradient(to bottom,
      rgba(0,0,0,0) 0 2px,
      rgba(0,0,0,.22) 2px 3px);
    mix-blend-mode:multiply; opacity:.55;
  }
  body::after{
    content:""; position:fixed; inset:0; z-index:59; pointer-events:none;
    background:radial-gradient(140% 120% at 50% 40%, transparent 55%, rgba(0,0,0,.55) 100%);
  }

  /* ============ chrome / scanbeam ============ */
  .scanbeam{position:fixed; left:0; right:0; top:0; height:120px; z-index:58; pointer-events:none;
    background:linear-gradient(to bottom, rgba(54,240,255,.05), transparent);
    animation:beam 7s linear infinite;}
  @keyframes beam{0%{transform:translateY(-120px)}100%{transform:translateY(100vh)}}

  a{color:inherit}
  .cur{display:inline-block; width:.62ch; height:1.05em; vertical-align:-.16em;
    background:var(--green); margin-left:.18ch; animation:blink 1.05s steps(1) infinite;}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}

  /* ============ top bar ============ */
  .topbar{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:stretch; justify-content:space-between; gap:18px; flex-wrap:wrap;
    padding:0; background:linear-gradient(180deg,var(--bg-2),var(--bg));
    border-bottom:1px solid var(--line-2);
    box-shadow:0 1px 0 rgba(54,240,255,.08), 0 14px 40px -28px rgba(54,240,255,.5);
  }
  .topbar .seg{display:flex; align-items:center; gap:14px; padding:14px 22px; min-height:60px}
  .topbar .seg.right{flex-wrap:wrap}
  .brand{display:flex; align-items:center; gap:13px; flex-wrap:wrap}
  .brand-mark{
    display:grid; place-items:center; width:40px; height:40px; flex:0 0 auto;
    color:var(--bg); background:var(--cyan); border-radius:3px;
    font:800 19px/1 var(--mono);
    box-shadow:0 0 0 1px rgba(54,240,255,.6), 0 0 18px -2px rgba(54,240,255,.7);
  }
  .brand-name{
    font-family:var(--crt); font-size:34px; line-height:.82; letter-spacing:.04em;
    color:var(--cyan); text-transform:uppercase;
    text-shadow:0 0 14px rgba(54,240,255,.55);
  }
  .brand-sub{
    font:700 10px/1.3 var(--mono); letter-spacing:.18em; text-transform:uppercase; color:var(--amber);
    border:1px solid rgba(255,176,0,.35); border-radius:2px;
    padding:5px 9px; background:rgba(255,176,0,.05); align-self:center; white-space:nowrap;
  }
  .toolbar{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .field{display:flex; align-items:stretch; font:700 10px var(--mono);
    letter-spacing:.14em; text-transform:uppercase; color:var(--fg-2);}
  .field .tag{display:grid; place-items:center; padding:0 11px; flex:0 0 auto;
    background:var(--panel-2); color:var(--cyan); border:1px solid var(--line-2);
    border-right:0; border-radius:3px 0 0 3px; letter-spacing:.1em;}
  select{
    font-family:var(--mono); font-weight:500; font-size:12px; color:var(--fg);
    background:var(--panel); border:1px solid var(--line-2); border-radius:0 3px 3px 0;
    padding:9px 30px 9px 12px; outline:none; cursor:pointer; max-width:340px;
    appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--cyan) 50%),linear-gradient(135deg,var(--cyan) 50%,transparent 50%);
    background-position:calc(100% - 15px) 52%, calc(100% - 10px) 52%;
    background-size:5px 5px,5px 5px; background-repeat:no-repeat;
    transition:border-color .15s, box-shadow .15s;
  }
  select:hover{border-color:var(--cyan-dim)}
  select:focus{border-color:var(--cyan); box-shadow:0 0 0 1px rgba(54,240,255,.4), 0 0 16px -4px rgba(54,240,255,.6)}

  .btn{
    font-family:var(--mono); font-weight:700; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    cursor:pointer; color:var(--cyan);
    border:1px solid var(--line-2); border-radius:3px; padding:9px 14px;
    background:var(--panel); position:relative;
    transition:color .15s, border-color .15s, box-shadow .15s, background .15s;
  }
  .btn::before{content:"▸ "; color:var(--fg-3)}
  .btn:hover{color:var(--bg); background:var(--cyan); border-color:var(--cyan);
    box-shadow:0 0 18px -3px rgba(54,240,255,.7)}
  .btn:hover::before{color:rgba(4,6,10,.6)}
  .btn:active{transform:translateY(1px)}
  .btn.gold{color:var(--amber); border-color:rgba(255,176,0,.4)}
  .btn.gold:hover{color:var(--bg); background:var(--amber); border-color:var(--amber);
    box-shadow:0 0 18px -3px rgba(255,176,0,.7)}

  /* ============ layout ============ */
  .wrap{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:30px 26px 70px}

  /* boot log */
  .bootlog{
    font:500 11px/1.7 var(--mono); color:var(--fg-3);
    border:1px solid var(--line); border-radius:4px; background:rgba(8,13,20,.6);
    padding:11px 16px; margin:0 0 26px; overflow:hidden;
  }
  .bootlog b{color:var(--green); font-weight:500}
  .bootlog .ok{color:var(--cyan)}
  .bootlog .am{color:var(--amber)}

  .section-head{display:flex; align-items:center; gap:14px; margin:0 0 16px;}
  .section-head h2{
    margin:0; font-family:var(--mono); text-transform:uppercase; font-size:11px; font-weight:800;
    letter-spacing:.22em; color:var(--cyan);
    display:flex; align-items:center; gap:9px;
  }
  .section-head h2::before{content:"[ "; color:var(--fg-3); font-weight:500}
  .section-head h2::after{content:" ]"; color:var(--fg-3); font-weight:500}
  .section-head .rule{flex:1; height:1px; background:linear-gradient(90deg,var(--line-2),transparent);}
  .section-head .addr{font:500 10px var(--mono); color:var(--fg-3); letter-spacing:.1em}

  .dash{display:grid; grid-template-columns:repeat(auto-fit,minmax(248px,1fr)); gap:16px}

  /* ============ panels ============ */
  .card{
    position:relative; border:1px solid var(--line-2); border-radius:5px; padding:0;
    background:
      linear-gradient(180deg, rgba(54,240,255,.02), transparent 40%),
      var(--panel);
    overflow:hidden;
    animation:bootin .4s both;
  }
  .card::before{
    /* corner ticks */
    content:""; position:absolute; inset:6px; pointer-events:none; border-radius:2px;
    background:
      linear-gradient(var(--line-2),var(--line-2)) left top/10px 1px no-repeat,
      linear-gradient(var(--line-2),var(--line-2)) left top/1px 10px no-repeat,
      linear-gradient(var(--line-2),var(--line-2)) right top/10px 1px no-repeat,
      linear-gradient(var(--line-2),var(--line-2)) right top/1px 10px no-repeat,
      linear-gradient(var(--line-2),var(--line-2)) left bottom/10px 1px no-repeat,
      linear-gradient(var(--line-2),var(--line-2)) left bottom/1px 10px no-repeat,
      linear-gradient(var(--line-2),var(--line-2)) right bottom/10px 1px no-repeat,
      linear-gradient(var(--line-2),var(--line-2)) right bottom/1px 10px no-repeat;
    opacity:.0; transition:opacity .2s;
  }
  .card:hover{border-color:var(--accent,var(--cyan))}
  .card:hover::before{opacity:.7}
  .card-head{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:9px 14px; border-bottom:1px solid var(--line);
    background:rgba(54,240,255,.025);
  }
  .card-title{font:800 10px var(--mono); letter-spacing:.18em; text-transform:uppercase;
    color:var(--accent,var(--cyan)); display:flex; align-items:center; gap:8px;}
  .card-title .dot{width:6px; height:6px; border-radius:50%; background:var(--accent,var(--cyan));
    box-shadow:0 0 8px var(--accent,var(--cyan)); flex:0 0 auto;}
  .card-id{font:500 9px var(--mono); color:var(--fg-3); letter-spacing:.12em}
  .card-body{padding:16px 14px}

  /* big readout */
  .readout{text-align:center; padding:4px 0 2px}
  .readout .num{font-family:var(--crt); font-size:74px; line-height:.85; color:var(--accent,var(--cyan));
    text-shadow:0 0 22px color-mix(in srgb, var(--accent,var(--cyan)) 55%, transparent);}
  .readout .num small{font-family:var(--crt); font-size:34px; opacity:.7}
  .readout .meta{margin-top:8px; font:500 10px var(--mono); letter-spacing:.14em; text-transform:uppercase; color:var(--fg-2)}
  .readout .meta b{color:var(--fg); font-weight:700}

  /* track-style progress mini bar inside readout */
  .scale{display:flex; gap:2px; justify-content:center; margin-top:14px}
  .scale i{width:7px; height:14px; background:var(--line); border-radius:1px; transition:.3s}
  .scale i.on{background:var(--accent,var(--cyan)); box-shadow:0 0 7px color-mix(in srgb,var(--accent,var(--cyan)) 60%, transparent)}

  /* streak */
  .streak-num{font-family:var(--crt); font-size:78px; line-height:.82; color:var(--amber);
    text-shadow:0 0 22px rgba(255,176,0,.5); text-align:center}
  .streak-sub{text-align:center; font:500 10px var(--mono); letter-spacing:.16em; text-transform:uppercase; color:var(--fg-2); margin-top:6px}

  /* progress rows */
  .prow{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:12px 0 5px;
    font:500 11px var(--mono); letter-spacing:.04em;}
  .prow .lbl{display:flex; align-items:center; gap:8px; color:var(--fg)}
  .prow .lbl::before{content:"▸"; color:var(--fg-3); font-size:9px}
  .prow .val{font:700 10px var(--mono); color:var(--accent,var(--cyan));
    letter-spacing:.06em; white-space:nowrap}
  .bar{height:9px; border-radius:2px; background:var(--bg-2);
    border:1px solid var(--line); overflow:hidden; position:relative}
  .bar>i{display:block; height:100%;
    background:var(--accent,var(--cyan));
    background-image:repeating-linear-gradient(90deg,
      rgba(4,6,10,.45) 0 2px, transparent 2px 6px);
    box-shadow:0 0 10px -1px var(--accent,var(--cyan));
    transition:width .6s cubic-bezier(.22,1,.36,1)}

  /* review queue */
  .due-list{font:500 12px/1.8 var(--mono); color:var(--fg)}
  .due-list .tk{display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px dashed var(--line)}
  .due-list .tk:last-child{border-bottom:0}
  .due-list .tk::before{content:"!"; color:var(--amber); font-weight:700; width:14px; text-align:center;
    border:1px solid rgba(255,176,0,.4); border-radius:2px; font-size:10px; line-height:14px; flex:0 0 auto}
  .due-empty{font:500 11px var(--mono); letter-spacing:.06em; color:var(--green)}
  .due-empty::before{content:"$ "; color:var(--fg-3)}

  /* ============ today / mission ============ */
  .today{
    position:relative; border:1px solid var(--line-2); border-radius:6px; overflow:hidden;
    background:
      linear-gradient(180deg, color-mix(in srgb,var(--accent,var(--cyan)) 5%, transparent), transparent 30%),
      var(--panel);
    box-shadow:0 0 0 1px rgba(54,240,255,.04), 0 28px 60px -40px color-mix(in srgb,var(--accent,var(--cyan)) 70%, transparent);
    animation:bootin .45s .05s both;
  }
  .today-bar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:11px 18px; border-bottom:1px solid var(--line);
    background:rgba(54,240,255,.03);
    font:700 10px var(--mono); letter-spacing:.16em; text-transform:uppercase; color:var(--fg-2);
  }
  .today-bar .tabs{display:flex; gap:5px; flex:0 0 auto}
  .today-bar .tabs i{width:9px; height:9px; border-radius:50%; border:1px solid var(--line-2)}
  .today-bar .tabs i:nth-child(1){background:var(--red); border-color:var(--red); opacity:.5}
  .today-bar .tabs i:nth-child(2){background:var(--amber); border-color:var(--amber); opacity:.5}
  .today-bar .tabs i:nth-child(3){background:var(--green); border-color:var(--green); opacity:.6}
  .today-bar .path{color:var(--cyan)}
  .today-bar .spacer{flex:1}
  .today-bar .stamp{color:var(--accent,var(--cyan)); letter-spacing:.2em}

  .today-main{padding:24px 26px 28px}

  .trackpill{
    display:inline-flex; align-items:center; gap:9px; padding:6px 12px; border-radius:3px;
    font:700 11px var(--mono); letter-spacing:.14em; text-transform:uppercase;
    color:var(--accent,var(--cyan));
    border:1px solid color-mix(in srgb,var(--accent,var(--cyan)) 45%, transparent);
    background:color-mix(in srgb,var(--accent,var(--cyan)) 8%, transparent);
  }
  .trackpill .k{font-family:var(--crt); font-size:15px; line-height:1}
  .trackpill .k::before{content:"["} .trackpill .k::after{content:"]"}

  .today-title{
    font-family:var(--crt); font-weight:400; font-size:clamp(30px,4.4vw,52px); line-height:.98;
    margin:16px 0 14px; color:var(--fg); letter-spacing:.01em;
    text-shadow:0 0 18px rgba(191,233,238,.12);
  }
  .today-title::before{content:"> "; color:var(--accent,var(--cyan))}

  .warm{
    display:flex; align-items:baseline; gap:11px; flex-wrap:wrap; margin-bottom:22px;
    padding:11px 14px; border-radius:4px; font:500 13px/1.55 var(--mono); color:var(--fg);
    background:var(--bg-2); border:1px solid var(--line); border-left:2px solid var(--amber);
  }
  .warm .muted{font:700 9px var(--mono); letter-spacing:.16em; text-transform:uppercase;
    color:var(--amber); flex:0 0 auto}
  .warm .warm-i{color:var(--amber)}

  /* tasks = terminal checklist */
  .tasks{display:flex; flex-direction:column; gap:6px; border:1px solid var(--line); border-radius:4px;
    background:var(--bg-2); padding:8px; }
  .task{
    position:relative; display:flex; gap:12px; align-items:flex-start; padding:9px 11px;
    border-radius:3px; cursor:pointer; user-select:none;
    border:1px solid transparent;
    transition:background .12s, border-color .12s;
    animation:bootin .35s both;
  }
  .task:hover{background:rgba(54,240,255,.04); border-color:var(--line-2)}
  .task input{position:absolute; opacity:0; width:0; height:0}
  .task .box{
    flex:0 0 auto; font:700 13px var(--mono); color:var(--fg-3); letter-spacing:-.04em;
    white-space:nowrap; margin-top:1px; transition:color .12s;
  }
  .task .box::before{content:"[ ]"}
  .task.done .box{color:var(--accent,var(--green))}
  .task.done .box::before{content:"[x]"; text-shadow:0 0 9px color-mix(in srgb,var(--accent,var(--green)) 55%, transparent)}
  .task-text{font:500 13.5px/1.5 var(--mono); color:var(--fg-2); transition:color .12s}
  .task:hover .task-text{color:var(--fg)}
  .task.done .task-text{color:var(--fg-3); text-decoration:line-through; text-decoration-thickness:1px}

  /* reflection */
  .reflect-block{margin-top:22px}
  .reflect-label{display:flex; align-items:center; gap:9px; margin-bottom:9px;
    font:700 10px var(--mono); letter-spacing:.12em; text-transform:uppercase; color:var(--fg-2)}
  .reflect-label .kanji{color:var(--cyan)}
  .reflect-label .kanji::before{content:"# "}
  textarea{
    width:100%; min-height:84px; resize:vertical;
    font:500 13px/1.6 var(--mono); color:var(--fg);
    background:var(--bg-2); border:1px solid var(--line); border-radius:4px;
    padding:12px 14px; outline:none; transition:border-color .15s, box-shadow .15s;
  }
  textarea:focus{border-color:var(--cyan); box-shadow:0 0 0 1px rgba(54,240,255,.3), inset 0 0 24px -16px rgba(54,240,255,.5)}
  textarea::placeholder{color:var(--fg-3)}

  .res-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:18px}
  .chip{
    font:500 11px var(--mono); color:var(--fg-2); padding:6px 10px; border-radius:3px;
    background:var(--bg-2); border:1px solid var(--line); letter-spacing:.03em;
  }
  .chip b{font-weight:700; color:var(--cyan)}
  .chip b::before{content:"↳ "; color:var(--fg-3)}
  #markReview{margin-top:20px}

  .rest-due{margin-top:14px; font:500 13px var(--mono); color:var(--fg)}
  .rest-due b{color:var(--amber)}

  /* footer */
  .foot{position:relative; z-index:1; text-align:center; padding:8px 0 44px; max-width:1180px; margin:0 auto}
  .foot span{display:inline-block; font:500 10px var(--mono); letter-spacing:.2em; text-transform:uppercase;
    color:var(--fg-3); border:1px solid var(--line); border-radius:3px; padding:7px 16px; background:rgba(8,13,20,.6)}
  .foot span b{color:var(--cyan-dim); font-weight:500}

  ::selection{background:rgba(54,240,255,.28); color:#eafdff}
  ::-webkit-scrollbar{width:11px; height:11px}
  ::-webkit-scrollbar-track{background:var(--bg-2)}
  ::-webkit-scrollbar-thumb{background:var(--line-2); border:2px solid var(--bg-2); border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:var(--cyan-dim)}

  @keyframes bootin{from{opacity:0; transform:translateY(8px)} to{opacity:1}}

  @media (max-width:640px){
    .topbar .seg{padding:12px 16px}
    .wrap{padding:22px 14px 56px}
    .brand-name{font-size:28px}
    .today-main{padding:20px 16px 22px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}
    .cur{animation:none; opacity:.9}}
</style>
</head>
<body>
<div class="scanbeam" aria-hidden="true"></div>

<header class="topbar">
  <div class="seg">
    <div class="brand">
      <span class="brand-mark">S</span>
      <span class="brand-name">Sunrise</span>
      <span class="brand-sub" id="phaseLabel"></span>
    </div>
  </div>
  <div class="seg right">
    <div class="toolbar">
      <label class="field"><span class="tag">DAY</span><select id="daySelect"></select></label>
      <button class="btn" id="exportBtn">export</button>
      <button class="btn" id="importBtn">import</button>
      <input type="file" id="importFile" accept="application/json" hidden />
    </div>
  </div>
</header>

<main class="wrap">
  <pre class="bootlog">[<span class="ok">boot</span>] sunrise.term :: cold-start ok
[<span class="ok">mount</span>] curriculum.js <span class="ok">linked</span> · logic.js <span class="ok">linked</span> · localStorage <span class="b">attached</span>
[<span class="am">ready</span>] awaiting operator input<span class="cur"></span></pre>

  <div class="section-head">
    <h2>telemetry</h2><span class="rule"></span><span class="addr">0x00 // dashboard</span>
  </div>
  <section class="dash" id="dashboard"></section>

  <div class="section-head" style="margin-top:34px">
    <h2>mission // active</h2><span class="rule"></span><span class="addr">0x01 // today</span>
  </div>
  <section class="today-wrap"><article class="today" id="todayCard"></article></section>
</main>

<div class="foot"><span><b>$</b>継続は力なり &mdash; consistency.exe still running</span></div>

<script src="curriculum.js"></script>
<script src="logic.js"></script>
<script>
const L = window.RoadmapLogic, C = window.Curriculum;
const KEY = 'devRoadmapState.v1';
const allDays = L.allDays(C);

const TRACKS = {
  dsa:       { label:'algorithms',   kanji:'ALG', color:'var(--amber)' },
  js:        { label:'javascript',   kanji:'JS',  color:'var(--green)' },
  ts:        { label:'typescript',   kanji:'TS',  color:'var(--cyan)' },
  node:      { label:'node.js',      kanji:'NOD', color:'var(--green)' },
  sysdesign: { label:'system design',kanji:'SYS', color:'var(--cyan)' },
  patterns:  { label:'patterns',     kanji:'PAT', color:'var(--amber)' },
  distsys:   { label:'distributed',  kanji:'DST', color:'var(--cyan)' },
  db:        { label:'databases',    kanji:'DB',  color:'var(--green)' },
  cs:        { label:'cs-core',      kanji:'CS',  color:'var(--amber)' },
  rest:      { label:'rest',         kanji:'IDL', color:'var(--cyan)' },
};
const trackMeta = (t) => TRACKS[t] || { label:t, kanji:'•', color:'var(--cyan)' };

function todayStr(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function loadState(){
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return L.createInitialState();
    const res = L.parseImported(raw);
    return res.ok ? res.state : L.createInitialState();
  } catch(e){ return L.createInitialState(); }
}
function saveState(){
  try { localStorage.setItem(KEY, L.serializeState(state)); } catch(e){}
}

let state = loadState();

function defaultDayId(){
  const firstOpen = allDays.find(d => d.track!=='rest' && !L.isDayComplete(C, state, d.id));
  return (firstOpen || allDays[allDays.length-1]).id;
}
let currentDayId = defaultDayId();

function dowName(dow){ return ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'][dow-1]; }

function renderDaySelect(){
  const sel = document.getElementById('daySelect');
  sel.innerHTML = allDays.map(d =>
    `<option value="${d.id}" ${d.id===currentDayId?'selected':''}>W${String(d.week).padStart(2,'0')} · ${dowName(d.dow)} · ${esc(trackMeta(d.track).label)}</option>`
  ).join('');
  sel.onchange = () => { currentDayId = sel.value; renderAll(); };
}

function renderToday(){
  const d = L.getDay(C, currentDayId);
  const el = document.getElementById('todayCard');
  const m = trackMeta(d.track);
  el.style.setProperty('--accent', m.color);
  document.getElementById('phaseLabel').textContent = `PHASE ${L.phaseOfWeek(d.week)} · WK ${String(d.week).padStart(2,'0')}`;

  if (d.track === 'rest'){
    const due = L.getDueReviews(state, todayStr());
    el.style.setProperty('--accent', 'var(--cyan)');
    el.innerHTML = `
      <div class="today-bar">
        <span class="tabs"><i></i><i></i><i></i></span>
        <span class="path">~/sunrise/${esc(currentDayId)}</span>
        <span class="spacer"></span>
        <span class="stamp">[ IDLE :: REST ]</span>
      </div>
      <div class="today-main">
        <span class="trackpill"><span class="k">${esc(m.kanji)}</span> ${esc(m.label)}</span>
        <h2 class="today-title">${esc(d.title)}</h2>
        <p class="warm"><span class="muted">[note]</span> <span class="warm-i">☾</span> ${esc(d.reflectPrompt)}</p>
        <div class="rest-due">${due.length ? '<span style="color:var(--fg-2)">// queue due today &mdash;</span> <b>'+esc(due.join(' · '))+'</b>' : '<span style="color:var(--green)">$ review queue empty &mdash; system at rest 🌙</span>'}</div>
      </div>`;
    return;
  }

  const st = state.days[currentDayId] || { tasks:{}, reflection:'' };
  el.innerHTML = `
    <div class="today-bar">
      <span class="tabs"><i></i><i></i><i></i></span>
      <span class="path">~/sunrise/${esc(currentDayId)}</span>
      <span class="spacer"></span>
      <span class="stamp">[ EXEC :: TODAY ]</span>
    </div>
    <div class="today-main">
      <span class="trackpill"><span class="k">${esc(m.kanji)}</span> ${esc(m.label)}</span>
      <h2 class="today-title">${esc(d.title)}</h2>
      <div class="warm"><span class="muted">[warmup]</span> <span class="warm-i">✦</span> ${esc(d.warmup)}</div>
      <div class="tasks" id="taskList"></div>
      <div class="reflect-block">
        <label class="reflect-label" for="reflect"><span class="kanji">log</span> ${esc(d.reflectPrompt)}</label>
        <textarea id="reflect" placeholder="// short note...">${esc(st.reflection||'')}</textarea>
      </div>
      ${d.resources.length ? '<div class="res-row">'+d.resources.map(r=>`<span class="chip"><b>${esc(r.label)}</b> ${esc(r.note)}</span>`).join('')+'</div>' : ''}
      ${d.track==='dsa' ? '<button class="btn gold" id="markReview">schedule pattern review // week</button>' : ''}
    </div>`;

  const list = document.getElementById('taskList');
  list.innerHTML = d.tasks.map((t,i) => {
    const done = !!(st.tasks && st.tasks[t.id]);
    return `<label class="task ${done?'done':''}" style="animation-delay:${i*45}ms">
      <input type="checkbox" id="cb_${t.id}" ${done?'checked':''}/>
      <span class="box"></span><span class="task-text">${esc(t.text)}</span></label>`;
  }).join('');
  d.tasks.forEach(t => {
    document.getElementById('cb_'+t.id).onchange = (e) => {
      state = L.setTaskDone(state, currentDayId, t.id, e.target.checked, todayStr());
      saveState(); renderAll();
    };
  });
  document.getElementById('reflect').oninput = (e) => {
    state = L.setReflection(state, currentDayId, e.target.value); saveState();
  };
  if (d.track==='dsa'){
    document.getElementById('markReview').onclick = () => {
      const item = `w${d.week}-${d.title}`;
      state = L.scheduleReview(state, item, todayStr()); saveState(); renderAll();
    };
  }
}

function renderAll(){ renderDaySelect(); renderToday(); renderDashboard(); }

function bar(pct){ return `<div class="bar"><i style="width:${pct}%"></i></div>`; }

function renderDashboard(){
  const overall = L.overallProgress(C, state);
  const streak = L.computeStreak(state, todayStr());
  const byPhase = L.progressByPhase(C, state);
  const byTrack = L.progressByTrack(C, state);
  const due = L.getDueReviews(state, todayStr());

  const phaseRows = [1,2,3].map((p) => {
    const x = byPhase[p] || {done:0,total:0,pct:0};
    return `<div class="prow"><span class="lbl">phase_${p}</span><span class="val">${String(x.done).padStart(2,'0')}/${String(x.total).padStart(2,'0')} · ${x.pct}%</span></div>${bar(x.pct)}`;
  }).join('');

  const trackRows = Object.keys(TRACKS).filter(k => k!=='rest' && byTrack[k]).map(k => {
    const x = byTrack[k];
    return `<div class="prow"><span class="lbl">${esc(TRACKS[k].label)}</span><span class="val" style="color:${TRACKS[k].color}">${String(x.pct).padStart(2,'0')}%</span></div>
      <div class="bar"><i style="width:${x.pct}%;background:${TRACKS[k].color};box-shadow:0 0 10px -1px ${TRACKS[k].color}"></i></div>`;
  }).join('');

  // 10-segment scale for overall progress
  const segs = Array.from({length:10}, (_,i) =>
    `<i class="${(i+1)*10 <= overall.pct ? 'on':''}"></i>`).join('');

  document.getElementById('dashboard').innerHTML = `
    <div class="card" style="--accent:var(--cyan);animation-delay:0ms">
      <div class="card-head">
        <span class="card-title"><span class="dot"></span>progress</span>
        <span class="card-id">0xA0 // total</span>
      </div>
      <div class="card-body">
        <div class="readout">
          <div class="num">${overall.pct}<small>%</small></div>
          <div class="scale">${segs}</div>
          <div class="meta">days cleared <b>${overall.done}/${overall.total}</b> · of 91</div>
        </div>
      </div>
    </div>
    <div class="card" style="--accent:var(--amber);animation-delay:55ms">
      <div class="card-head">
        <span class="card-title"><span class="dot"></span>streak</span>
        <span class="card-id">0xA1 // chain</span>
      </div>
      <div class="card-body">
        <div class="streak-num">${String(streak).padStart(2,'0')}</div>
        <div class="streak-sub">▸ ${streak===1?'day':(streak>=2&&streak<=4?'days':'days')} in chain · uptime</div>
      </div>
    </div>
    <div class="card" style="--accent:var(--green);animation-delay:110ms">
      <div class="card-head">
        <span class="card-title"><span class="dot"></span>phases</span>
        <span class="card-id">0xA2 // 3-tier</span>
      </div>
      <div class="card-body">${phaseRows}</div>
    </div>
    <div class="card" style="--accent:var(--cyan);animation-delay:165ms">
      <div class="card-head">
        <span class="card-title"><span class="dot"></span>tracks</span>
        <span class="card-id">0xA3 // domains</span>
      </div>
      <div class="card-body">${trackRows || '<div class="due-empty">no data yet</div>'}</div>
    </div>
    <div class="card" style="--accent:var(--amber);animation-delay:220ms">
      <div class="card-head">
        <span class="card-title"><span class="dot"></span>review queue</span>
        <span class="card-id">0xA4 // srs</span>
      </div>
      <div class="card-body">
        ${due.length ? '<div class="due-list">'+due.map(x=>'<span class="tk">'+esc(x)+'</span>').join('')+'</div>' : '<div class="due-empty">queue clear</div>'}
      </div>
    </div>
  `;
}

document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([L.serializeState(state)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'progress.json';
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const res = L.parseImported(String(reader.result));
    if (!res.ok){ alert('Импорт не удался: ' + res.error + '\nТекущий прогресс не изменён.'); return; }
    state = res.state; saveState(); currentDayId = defaultDayId(); renderAll();
    alert('Прогресс импортирован.');
  };
  reader.readAsText(file);
  e.target.value = '';
};
renderAll();
</script>
</body>
</html>
